# Validação manual e auditável do domínio público antes e depois do cutover.
name: Smoke test de cutover

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: URL pública que deve ser validada
        required: true
        default: https://www.tempopelotas.com.br
        type: string
  push:
    branches:
      - agent/production-cutover-runbook
    paths:
      - scripts/cutover-smoke.mjs
      - .github/workflows/cutover-smoke.yml
      - docs/PRODUCTION_CUTOVER.md
  pull_request:
    branches:
      - main
    paths:
      - scripts/cutover-smoke.mjs
      - .github/workflows/cutover-smoke.yml
      - docs/PRODUCTION_CUTOVER.md
      - src/lib/site-config.ts
      - src/lib/public-routes.ts
      - src/routes/robots[.]txt.ts
      - src/routes/sitemap[.]xml.ts
      - src/routes/feed.ts
      - src/routes/pelotas[.]json.ts

permissions:
  contents: read

concurrency:
  group: cutover-smoke-${{ github.ref }}-${{ inputs.base_url }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validar domínio público
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Executar smoke test
        env:
          BASE_URL: ${{ inputs.base_url || 'https://www.tempopelotas.com.br' }}
        run: node scripts/cutover-smoke.mjs

      - name: Publicar relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cutover-smoke-${{ github.run_number }}
          path: artifacts/cutover-smoke
          if-no-files-found: error
          retention-days: 30
