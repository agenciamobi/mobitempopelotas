name: Corrigir status do vídeo manual

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.head_ref == 'agent/fix-manual-youtube-status' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-manual-youtube-status
          fetch-depth: 0

      - name: Aplicar correção
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/cameras/youtube.server.ts')
          text = path.read_text(encoding='utf-8')

          old_status = '''function normalizeBroadcastStatus(value: string | undefined): YouTubeBroadcastStatus {
            return value?.trim().toLowerCase() === "replay" ? "replay" : "live";
          }'''
          new_status = '''function normalizeBroadcastStatus(value: string | undefined): YouTubeBroadcastStatus | null {
            const status = value?.trim().toLowerCase();
            return status === "live" || status === "replay" ? status : null;
          }'''
          if text.count(old_status) != 1:
              raise SystemExit(f'Bloco normalizeBroadcastStatus não encontrado: {text.count(old_status)}')
          text = text.replace(old_status, new_status, 1)

          insertion_anchor = '''async function fetchPublicLiveStream(handle: string) {
            const normalizedHandle = handle.startsWith("@") ? handle : `@${handle}`;
            const response = await fetch(`${YOUTUBE_ORIGIN}/${normalizedHandle}/streams`, {
              headers: {
                Accept: "text/html,application/xhtml+xml",
                "Accept-Language": "pt-BR,pt;q=0.9,en;q=0.7",
                "User-Agent": "Mozilla/5.0 (compatible; TempoPelotas/1.0; +https://agenciamobi.com.br)",
              },
              signal: AbortSignal.timeout(REQUEST_TIMEOUT_MS),
            });

            if (!response.ok) {
              throw new Error(`Página pública do YouTube respondeu com HTTP ${response.status}.`);
            }

            return extractPublicLiveStream(await response.text());
          }
          '''
          insertion = insertion_anchor + '''
          function publicPageConfirmsVideoLive(html: string, videoId: string) {
            const marker = `"videoId":"${videoId}"`;
            let position = html.indexOf(marker);

            while (position >= 0) {
              const context = html.slice(Math.max(0, position - 8_000), position + 8_000);
              if (/"isLiveNow":true/.test(context)) return true;
              position = html.indexOf(marker, position + marker.length);
            }

            return false;
          }

          async function isPublicVideoLive(videoId: string) {
            const response = await fetch(`${YOUTUBE_ORIGIN}/watch?v=${videoId}`, {
              headers: {
                Accept: "text/html,application/xhtml+xml",
                "Accept-Language": "pt-BR,pt;q=0.9,en;q=0.7",
                "User-Agent": "Mozilla/5.0 (compatible; TempoPelotas/1.0; +https://agenciamobi.com.br)",
              },
              signal: AbortSignal.timeout(REQUEST_TIMEOUT_MS),
            });

            if (!response.ok) {
              throw new Error(`Página do vídeo manual respondeu com HTTP ${response.status}.`);
            }

            return publicPageConfirmsVideoLive(await response.text(), videoId);
          }
          '''
          if text.count(insertion_anchor) != 1:
              raise SystemExit(f'Âncora de página pública não encontrada: {text.count(insertion_anchor)}')
          text = text.replace(insertion_anchor, insertion, 1)

          old_bottom = '''export async function getLatestLaranjalStream() {
            const manualVideoId = normalizeVideoId(process.env.YOUTUBE_LARANJAL_VIDEO_ID);
            if (manualVideoId) {
              return streamFromVideoId({
                videoId: manualVideoId,
                title: process.env.YOUTUBE_LARANJAL_VIDEO_TITLE?.trim() || "Praia do Laranjal",
                status: normalizeBroadcastStatus(process.env.YOUTUBE_LARANJAL_VIDEO_STATUS),
                publishedAt: null,
                source: "manual",
              });
            }

            const handle = process.env.YOUTUBE_CHANNEL_HANDLE?.trim() || DEFAULT_CHANNEL_HANDLE;
            const channelId = process.env.YOUTUBE_CHANNEL_ID?.trim() || DEFAULT_CHANNEL_ID;
            const apiKey = process.env.YOUTUBE_API_KEY?.trim();

            if (apiKey) {
              try {
                const apiStream = await fetchStreamFromApi(apiKey, handle);
                if (apiStream) return apiStream;
              } catch (error) {
                console.warn("[cameras/youtube] API indisponível; tentando página pública", {
                  message: error instanceof Error ? error.message : String(error),
                });
              }
            }

            try {
              const publicStream = await fetchPublicLiveStream(handle);
              if (publicStream) return publicStream;
            } catch (error) {
              console.warn("[cameras/youtube] Página pública indisponível", {
                message: error instanceof Error ? error.message : String(error),
              });
            }

            try {
              return await fetchLatestReplay(channelId);
            } catch (error) {
              console.warn("[cameras/youtube] Feed público indisponível", {
                message: error instanceof Error ? error.message : String(error),
              });
              return null;
            }
          }'''
          new_bottom = '''export async function getLatestLaranjalStream() {
            const handle = process.env.YOUTUBE_CHANNEL_HANDLE?.trim() || DEFAULT_CHANNEL_HANDLE;
            const channelId = process.env.YOUTUBE_CHANNEL_ID?.trim() || DEFAULT_CHANNEL_ID;
            const apiKey = process.env.YOUTUBE_API_KEY?.trim();
            const manualVideoId = normalizeVideoId(process.env.YOUTUBE_LARANJAL_VIDEO_ID);
            const manualStatus = normalizeBroadcastStatus(process.env.YOUTUBE_LARANJAL_VIDEO_STATUS);
            const manualTitle =
              process.env.YOUTUBE_LARANJAL_VIDEO_TITLE?.trim() || "Praia do Laranjal";
            let manualReplayFallback: YouTubeCameraStream | null = null;

            if (manualVideoId) {
              if (manualStatus === "replay") {
                return streamFromVideoId({
                  videoId: manualVideoId,
                  title: manualTitle,
                  status: "replay",
                  publishedAt: null,
                  source: "manual",
                });
              }

              try {
                if (await isPublicVideoLive(manualVideoId)) {
                  return streamFromVideoId({
                    videoId: manualVideoId,
                    title: manualTitle,
                    status: "live",
                    publishedAt: null,
                    source: "manual",
                  });
                }
              } catch (error) {
                console.warn("[cameras/youtube] Não foi possível confirmar o vídeo manual ao vivo", {
                  videoId: manualVideoId,
                  message: error instanceof Error ? error.message : String(error),
                });
              }

              manualReplayFallback = streamFromVideoId({
                videoId: manualVideoId,
                title: manualTitle,
                status: "replay",
                publishedAt: null,
                source: "manual",
              });
            }

            if (apiKey) {
              try {
                const apiStream = await fetchStreamFromApi(apiKey, handle);
                if (apiStream?.status === "live") return apiStream;
              } catch (error) {
                console.warn("[cameras/youtube] API indisponível; tentando página pública", {
                  message: error instanceof Error ? error.message : String(error),
                });
              }
            }

            try {
              const publicStream = await fetchPublicLiveStream(handle);
              if (publicStream) return publicStream;
            } catch (error) {
              console.warn("[cameras/youtube] Página pública indisponível", {
                message: error instanceof Error ? error.message : String(error),
              });
            }

            try {
              const latestReplay = await fetchLatestReplay(channelId);
              if (latestReplay) return latestReplay;
            } catch (error) {
              console.warn("[cameras/youtube] Feed público indisponível", {
                message: error instanceof Error ? error.message : String(error),
              });
            }

            return manualReplayFallback;
          }'''
          if text.count(old_bottom) != 1:
              raise SystemExit(f'Bloco getLatestLaranjalStream não encontrado: {text.count(old_bottom)}')
          path.write_text(text.replace(old_bottom, new_bottom, 1), encoding='utf-8')
          PY

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivo
        run: npx prettier --write src/lib/cameras/youtube.server.ts

      - name: Validar canal e vídeos públicos
        shell: bash
        run: |
          set -euo pipefail
          USER_AGENT='Mozilla/5.0 (compatible; TempoPelotas/1.0; +https://agenciamobi.com.br)'
          for url in \
            'https://www.youtube.com/watch?v=VJirpsVFwSg' \
            'https://www.youtube.com/@praiadolaranjal/streams' \
            'https://www.youtube.com/feeds/videos.xml?channel_id=UCqvFgdUJ7kuChDA7hbnz1ZA'; do
            status="$(curl --silent --show-error --location --compressed --max-time 30 \
              --user-agent "$USER_AGENT" \
              --output /dev/null \
              --write-out '%{http_code}' \
              "$url")"
            test "$status" = "200"
          done

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Publicar correção
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/cameras/youtube.server.ts
          git commit -m "fix: valida status do vídeo manual"
          git push origin HEAD:agent/fix-manual-youtube-status
