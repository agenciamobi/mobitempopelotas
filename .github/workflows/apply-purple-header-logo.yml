name: Aplicar logo roxo no header

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-header-brand:
    if: github.head_ref == 'agent/header-purple-logo-clean' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/header-purple-logo-clean

      - name: Aplicar ajuste
        run: python scripts/apply-purple-header-logo.py

      - name: Commitar resultado
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/production/components/site-header.tsx src/production/styles/header-template-refinement-v2.css src/components/layout/Header.tsx src/components/layout/Header.css
          git commit -m "brand: usa logo roxo ampliado no header"
          git push origin HEAD:agent/header-purple-logo-clean
