name: Aplicar logotipos oficiais no PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-logo:
    if: github.head_ref == 'agent/apply-official-logo' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/apply-official-logo

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Aplicar ativos e componentes
        id: apply
        continue-on-error: true
        run: |
          set +e
          python scripts/apply-official-logo.py > .github/logo-assets/apply-logo.log 2>&1
          python_status=$?
          if [ "$python_status" -eq 0 ]; then
            npx prettier --write \
              src/components/layout/Header.tsx \
              src/components/layout/Header.css \
              src/components/layout/Footer.tsx \
              src/components/layout/Footer.css \
              src/production/components/site-header.tsx \
              src/production/components/site-footer.tsx \
              public/brand/README.md >> .github/logo-assets/apply-logo.log 2>&1
            prettier_status=$?
          else
            prettier_status=0
          fi
          echo "python_status=$python_status" >> .github/logo-assets/apply-logo.log
          echo "prettier_status=$prettier_status" >> .github/logo-assets/apply-logo.log
          echo "status=$((python_status + prettier_status))" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publicar diagnóstico
        uses: actions/upload-artifact@v4
        with:
          name: apply-official-logo-${{ github.run_id }}
          path: .github/logo-assets/apply-logo.log
          if-no-files-found: error
          retention-days: 1

      - name: Commitar resultado
        if: steps.apply.outputs.status == '0'
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/brand src/components/layout src/production/components/site-header.tsx src/production/components/site-footer.tsx
          git commit -m "brand: aplica logotipos oficiais do Tempo Pelotas"
          git push origin HEAD:agent/apply-official-logo

      - name: Falhar quando a aplicação não concluir
        if: steps.apply.outputs.status != '0'
        run: |
          cat .github/logo-assets/apply-logo.log
          exit 1
