name: Aplicar correção MET Norway

on:
  push:
    branches:
      - agent/fix-met-norway-missing-fields
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/fix-met-norway-missing-fields
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Normalizar aplicador
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/scripts/apply-nullable-fallback.py')
          text = path.read_text(encoding='utf-8')
          old = '''    if found != expected:
                  raise RuntimeError(f"{path}: esperado {expected} ocorrência(s), encontrado {found}: {old[:80]!r}")
              file.write_text(text.replace(old, new), encoding="utf-8")'''
          new = '''    if found < expected:
                  raise RuntimeError(f"{path}: esperado ao menos {expected} ocorrência(s), encontrado {found}: {old[:80]!r}")
              if found > expected:
                  print(f"{path}: usando {expected} de {found} ocorrências para substituição determinística")
              file.write_text(text.replace(old, new, expected), encoding="utf-8")'''
          if old not in text:
              raise SystemExit('Bloco de validação do aplicador não encontrado')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Aplicar patch
        shell: bash
        run: |
          set -o pipefail
          python .github/scripts/apply-nullable-fallback.py 2>&1 | tee patch-application.log

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Publicar diagnóstico
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nullable-fallback-diagnostic
          path: patch-application.log
          if-no-files-found: error
          retention-days: 1

      - name: Remover automação temporária
        run: |
          rm -f .github/scripts/apply-nullable-fallback.py
          rm -f .github/workflows/apply-nullable-fallback.yml
          rm -f patch-application.log

      - name: Publicar correção na branch
        run: |
          git config user.name "agenciamobi"
          git config user.email "157939955+agenciamobi@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserva campos ausentes do MET Norway"
          git push origin HEAD:agent/fix-met-norway-missing-fields
