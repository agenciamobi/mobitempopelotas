name: Preparar dependências Supabase

on:
  push:
    branches:
      - agent/supabase-external-foundation
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-dependencies-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Gerar package e lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências Supabase fixadas
        run: npm install --save-exact @supabase/supabase-js@latest @supabase/ssr@latest --no-audit --no-fund

      - name: Publicar package e lockfile
        uses: actions/upload-artifact@v4
        with:
          name: supabase-package-files
          path: |
            package.json
            package-lock.json
          if-no-files-found: error
          retention-days: 1
