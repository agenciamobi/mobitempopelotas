name: Aplicar núcleo de SEO

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.head_ref == 'agent/seo-core' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/seo-core
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Aplicar implementação
        run: python .github/scripts/apply-seo-core.py

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivos TypeScript
        run: |
          npx prettier --write \
            src/lib/site-config.ts \
            src/lib/public-routes.ts \
            src/lib/page-meta.ts \
            src/routes/__root.tsx \
            src/routes/index.tsx \
            src/routes/alertas.tsx \
            src/routes/metodologia.tsx \
            src/routes/vento-em-pelotas.tsx \
            src/routes/chuva-em-pelotas.tsx \
            src/routes/tempo-hoje-pelotas.tsx \
            src/routes/cameras-ao-vivo-pelotas.tsx \
            src/routes/estacao-embrapa-pelotas.tsx \
            src/routes/previsao-7-dias-pelotas.tsx \
            src/routes/historico-climatico-pelotas.tsx \
            src/routes/situacao-hidrologica-pelotas.tsx \
            src/routes/nivel-da-lagoa-dos-patos-laranjal.tsx \
            'src/routes/sitemap[.]xml.ts' \
            'src/routes/robots[.]txt.ts'

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Iniciar runtime SSR
        run: |
          npm run dev -- --host 127.0.0.1 --port 3000 > /tmp/tempo-pelotas-seo.log 2>&1 &
          echo $! > /tmp/tempo-pelotas-seo.pid

      - name: Aguardar runtime
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ > /tmp/home.html; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/tempo-pelotas-seo.log
          exit 1

      - name: Validar canonical e dados estruturados
        run: |
          grep -q 'rel="canonical"' /tmp/home.html
          grep -q 'https://mobitempopelotas.lovable.app/' /tmp/home.html
          grep -q 'application/ld+json' /tmp/home.html
          grep -q '"@type":"WebSite"' /tmp/home.html

      - name: Validar sitemap
        run: |
          curl --fail --silent --show-error --dump-header /tmp/sitemap.headers \
            http://127.0.0.1:3000/sitemap.xml > /tmp/sitemap.xml
          grep -qi '^content-type: application/xml' /tmp/sitemap.headers
          grep -q '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' /tmp/sitemap.xml
          test "$(grep -c '<url>' /tmp/sitemap.xml)" -eq 12
          grep -q '<loc>https://mobitempopelotas.lovable.app/tempo-hoje-pelotas</loc>' /tmp/sitemap.xml
          grep -q '<loc>https://mobitempopelotas.lovable.app/metodologia</loc>' /tmp/sitemap.xml

      - name: Validar robots
        run: |
          curl --fail --silent --show-error --dump-header /tmp/robots.headers \
            http://127.0.0.1:3000/robots.txt > /tmp/robots.txt
          grep -qi '^content-type: text/plain' /tmp/robots.headers
          grep -q '^User-agent: \*$' /tmp/robots.txt
          grep -q '^Allow: /$' /tmp/robots.txt
          grep -q '^Sitemap: https://mobitempopelotas.lovable.app/sitemap.xml$' /tmp/robots.txt

      - name: Publicar arquivos na branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .env.example MIGRATION_MATRIX.md src
          git commit -m "feat: adiciona núcleo de SEO técnico"
          git push origin HEAD:agent/seo-core

      - name: Exibir diagnóstico
        if: failure()
        run: |
          cat /tmp/tempo-pelotas-seo.log 2>/dev/null || true
          cat /tmp/sitemap.headers 2>/dev/null || true
          cat /tmp/sitemap.xml 2>/dev/null || true
          cat /tmp/robots.headers 2>/dev/null || true
          cat /tmp/robots.txt 2>/dev/null || true
