name: Integrar hidrologia regional

on:
  push:
    branches:
      - agent/hydrology-regional-network

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: ${{ !contains(github.event.head_commit.message, '[hydrology-patch]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/hydrology-regional-network
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Integrar painel regional nas páginas
        run: |
          python <<'PY'
          from pathlib import Path

          pages_path = Path("src/components/hydrology/HydrologyPages.tsx")
          pages = pages_path.read_text()

          pages = pages.replace(
              'import type { LaranjalLevelData } from "@/lib/hydrology/laranjal-level.server";\n',
              'import type { GuaibaObservationData } from "@/lib/hydrology/guaiba.server";\n'
              'import type { LagoonMonitoringNetworkData } from "@/lib/hydrology/lagoon-network.server";\n'
              'import type { LaranjalLevelData } from "@/lib/hydrology/laranjal-level.server";\n',
              1,
          )
          pages = pages.replace(
              'import "./HydrologyPages.css";\n',
              'import { RegionalWaterNetwork } from "./RegionalWaterNetwork";\n'
              'import "./HydrologyPages.css";\n',
              1,
          )
          pages = pages.replace(
              'export function HydrologyOverviewPage({\n'
              '  weather,\n'
              '  level,\n'
              '}: {\n'
              '  weather: WeatherIntelligenceData;\n'
              '  level: LaranjalLevelData;\n'
              '}) {',
              'export function HydrologyOverviewPage({\n'
              '  weather,\n'
              '  level,\n'
              '  guaiba,\n'
              '  lagoon,\n'
              '}: {\n'
              '  weather: WeatherIntelligenceData;\n'
              '  level: LaranjalLevelData;\n'
              '  guaiba: GuaibaObservationData;\n'
              '  lagoon: LagoonMonitoringNetworkData;\n'
              '}) {',
              1,
          )
          pages = pages.replace(
              '      <LevelReading level={level} />\n'
              '      <WeatherWaterContext weather={weather} />\n',
              '      <LevelReading level={level} />\n'
              '      <RegionalWaterNetwork guaiba={guaiba} lagoon={lagoon} variant="full" />\n'
              '      <WeatherWaterContext weather={weather} />\n',
              1,
          )
          pages_path.write_text(pages)

          route_path = Path("src/routes/situacao-hidrologica-pelotas.tsx")
          route = route_path.read_text()
          route = route.replace(
              'import { getLaranjalLevelData } from "@/lib/hydrology/laranjal-level.functions";\n',
              'import { getGuaibaObservation } from "@/lib/hydrology/guaiba.functions";\n'
              'import { getLagoonMonitoringNetwork } from "@/lib/hydrology/lagoon-network.functions";\n'
              'import { getLaranjalLevelData } from "@/lib/hydrology/laranjal-level.functions";\n',
              1,
          )
          route = route.replace(
              '    const [weather, level] = await Promise.all([getWeatherIntelligence(), getLaranjalLevelData()]);\n'
              '    return { weather, level };',
              '    const [weather, level, guaiba, lagoon] = await Promise.all([\n'
              '      getWeatherIntelligence(),\n'
              '      getLaranjalLevelData(),\n'
              '      getGuaibaObservation(),\n'
              '      getLagoonMonitoringNetwork(),\n'
              '    ]);\n'
              '    return { weather, level, guaiba, lagoon };',
              1,
          )
          route = route.replace(
              '  return <HydrologyOverviewPage weather={data.weather} level={data.level} />;',
              '  return (\n'
              '    <HydrologyOverviewPage\n'
              '      weather={data.weather}\n'
              '      level={data.level}\n'
              '      guaiba={data.guaiba}\n'
              '      lagoon={data.lagoon}\n'
              '    />\n'
              '  );',
              1,
          )
          route_path.write_text(route)
          PY

      - name: Formatar arquivos
        run: |
          npx prettier --write \
            src/lib/hydrology/guaiba.server.ts \
            src/lib/hydrology/guaiba.functions.ts \
            src/lib/hydrology/lagoon-network.server.ts \
            src/lib/hydrology/lagoon-network.functions.ts \
            src/components/hydrology/RegionalWaterNetwork.tsx \
            src/components/hydrology/RegionalWaterNetwork.css \
            src/components/hydrology/HydrologyPages.tsx \
            src/components/weather/WeatherHome.tsx \
            src/routes/index.tsx \
            src/routes/situacao-hidrologica-pelotas.tsx

      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint

      - name: Publicar correção validada na branch
        run: |
          rm .github/workflows/hydrology-branch-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteração adicional necessária."
            exit 0
          fi
          git commit -m "[hydrology-patch] integra e valida rede regional"
          git push origin HEAD:agent/hydrology-regional-network
