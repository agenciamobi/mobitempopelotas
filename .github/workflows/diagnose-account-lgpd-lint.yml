name: Diagnosticar lint LGPD

on:
  push:
    branches:
      - agent/account-lgpd-rights
    paths:
      - .github/workflows/diagnose-account-lgpd-lint.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/account-lgpd-rights
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Capturar saída do ESLint
        run: |
          set +e
          npm run lint > /tmp/account-lgpd-lint.log 2>&1
          status=$?
          tail -n 160 /tmp/account-lgpd-lint.log > ACCOUNT_LGPD_LINT_DIAGNOSTIC.txt
          printf '\nexit_code=%s\n' "$status" >> ACCOUNT_LGPD_LINT_DIAGNOSTIC.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ACCOUNT_LGPD_LINT_DIAGNOSTIC.txt
          git commit -m "chore: registra diagnóstico temporário do lint LGPD" || true
          git push origin HEAD:agent/account-lgpd-rights
