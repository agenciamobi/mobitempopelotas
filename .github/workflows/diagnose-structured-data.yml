name: Diagnosticar dados estruturados

on:
  push:
    branches:
      - agent/structured-data-schema
    paths:
      - .github/workflows/diagnose-structured-data.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/structured-data-schema
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Capturar erro de build
        run: |
          set +e
          npm run build > /tmp/structured-data-build.log 2>&1
          status=$?
          tail -n 180 /tmp/structured-data-build.log > STRUCTURED_DATA_BUILD_DIAGNOSTIC.txt
          printf '\nexit_code=%s\n' "$status" >> STRUCTURED_DATA_BUILD_DIAGNOSTIC.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STRUCTURED_DATA_BUILD_DIAGNOSTIC.txt
          git commit -m "chore: registra diagnóstico temporário do schema" || true
          git push origin HEAD:agent/structured-data-schema
