name: Formatar contrato público

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/public-data-feed' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/public-data-feed
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Aplicar Prettier
        run: npx prettier --write src/lib/public-portal.server.ts

      - name: Publicar formatação
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/public-portal.server.ts
          if git diff --cached --quiet; then
            echo "Arquivo já formatado."
            exit 0
          fi
          git commit -m "style: formata contrato público"
          git push origin HEAD:agent/public-data-feed
