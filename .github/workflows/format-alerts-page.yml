name: Formatação temporária da página de alertas

on:
  push:
    branches:
      - agent/migrate-alerts-page

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/migrate-alerts-page

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Aplicar Prettier
        run: npx prettier --write src/components/weather/WeatherAlertsPage.tsx src/components/weather/WeatherAlertsPage.css src/routes/alertas.tsx

      - name: Registrar formatação
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/weather/WeatherAlertsPage.tsx src/components/weather/WeatherAlertsPage.css src/routes/alertas.tsx
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de formatação."
          else
            git commit -m "style: formata página de alertas"
            git push origin HEAD:agent/migrate-alerts-page
          fi
