name: Formatar testes de contratos

on:
  push:
    branches:
      - agent/contract-tests-and-cutover-quality

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/contract-tests-and-cutover-quality
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Aplicar Prettier no escopo
        run: >-
          npx prettier --write
          package.json
          .github/workflows/quality.yml
          tests/water-level-state.test.ts
          tests/public-routes.test.ts
          tests/push-http.test.ts

      - name: Executar testes
        run: npm test

      - name: Registrar formatação
        run: |
          if git diff --quiet; then
            echo "Nenhuma alteração de formatação."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json .github/workflows/quality.yml tests
          git commit -m "style: formatar testes de contratos"
          git push origin HEAD:agent/contract-tests-and-cutover-quality
