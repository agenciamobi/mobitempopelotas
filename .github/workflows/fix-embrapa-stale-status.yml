name: Corrigir estado atrasado da Embrapa

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.head_ref == 'agent/migrate-embrapa-page' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/migrate-embrapa-page
          fetch-depth: 0

      - name: Corrigir estado consolidado
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: esperado 1 trecho, encontrado {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace(
              "src/components/embrapa/EmbrapaStationPage.tsx",
              '''const statusLabels = {
            live: "Leituras reconhecidas",
            partial: "Leitura parcial",
            unavailable: "Medições indisponíveis",
          } as const;''',
              '''const statusLabels = {
            live: "Leituras reconhecidas",
            partial: "Leitura parcial",
            stale: "Leitura atrasada",
            unavailable: "Medições indisponíveis",
          } as const;''',
          )
          replace(
              "src/components/embrapa/EmbrapaStationPage.tsx",
              '''function SourceStatus({
            status,
            error,
          }: {
            status: "live" | "partial" | "unavailable";
            error: string | null;
          }) {
            const Icon = status === "live" ? CheckCircle2 : status === "partial" ? Clock3 : Info;

            return (
              <div className={`embrapa-source-status embrapa-source-status-${status}`} role="status">
                <Icon aria-hidden="true" />
                <div>
                  <strong>{statusLabels[status]}</strong>
                  <span>
                    {status === "live"
                      ? "A página da estação respondeu e os principais campos foram reconhecidos."
                      : status === "partial"
                        ? "A fonte respondeu, mas alguns campos não puderam ser identificados."
                        : error || "Não foi possível consultar ou interpretar a página da estação."}
                  </span>
                </div>
              </div>
            );
          }''',
              '''function SourceStatus({
            status,
            reason,
          }: {
            status: "live" | "partial" | "stale" | "unavailable";
            reason: string | null;
          }) {
            const Icon = status === "live" ? CheckCircle2 : status === "unavailable" ? Info : Clock3;

            return (
              <div className={`embrapa-source-status embrapa-source-status-${status}`} role="status">
                <Icon aria-hidden="true" />
                <div>
                  <strong>{statusLabels[status]}</strong>
                  <span>
                    {status === "live"
                      ? "A página da estação respondeu e os principais campos foram reconhecidos."
                      : status === "partial"
                        ? "A fonte respondeu, mas alguns campos não puderam ser identificados."
                        : status === "stale"
                          ? reason || "A última leitura disponível está atrasada e não foi usada como condição atual."
                          : reason || "Não foi possível consultar ou interpretar a página da estação."}
                  </span>
                </div>
              </div>
            );
          }''',
          )
          replace(
              "src/components/embrapa/EmbrapaStationPage.tsx",
              '''  const observation = data.weather.observation;
            const available = observation.status !== "unavailable";
            const usedAsCurrentSource = data.weather.quality.currentSource === "embrapa";''',
              '''  const observation = data.weather.observation;
            const sourceHealth = data.weather.sources.embrapa;
            const displayStatus = sourceHealth.status;
            const available = observation.status !== "unavailable";
            const usedAsCurrentSource = data.weather.quality.currentSource === "embrapa";''',
          )
          replace(
              "src/components/embrapa/EmbrapaStationPage.tsx",
              '''        <aside className={`embrapa-primary-reading embrapa-primary-reading-${observation.status}`}>''',
              '''        <aside className={`embrapa-primary-reading embrapa-primary-reading-${displayStatus}`}>''',
          )
          replace(
              "src/components/embrapa/EmbrapaStationPage.tsx",
              '''      <SourceStatus status={observation.status} error={observation.error} />''',
              '''      <SourceStatus status={displayStatus} reason={sourceHealth.reason} />''',
          )
          replace(
              "src/components/embrapa/EmbrapaStationPage.css",
              '''.embrapa-primary-reading-partial::before {
            background: #f2a335;
          }''',
              '''.embrapa-primary-reading-partial::before,
          .embrapa-primary-reading-stale::before {
            background: #f2a335;
          }''',
          )
          replace(
              "src/components/embrapa/EmbrapaStationPage.css",
              '''.embrapa-source-status-partial {
            border: 1px solid rgba(138, 89, 0, 0.14);
            background: #fff8e6;
            color: #815500;
          }''',
              '''.embrapa-source-status-partial,
          .embrapa-source-status-stale {
            border: 1px solid rgba(138, 89, 0, 0.14);
            background: #fff8e6;
            color: #815500;
          }''',
          )
          PY

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivos
        run: |
          npx prettier --write \
            src/components/embrapa/EmbrapaStationPage.tsx \
            src/components/embrapa/EmbrapaStationPage.css

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Publicar correção
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/embrapa/EmbrapaStationPage.tsx src/components/embrapa/EmbrapaStationPage.css
          git commit -m "fix: informa leitura atrasada da Embrapa"
          git push origin HEAD:agent/migrate-embrapa-page
