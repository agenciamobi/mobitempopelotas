name: Corrigir revisão do histórico

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.head_ref == 'agent/migrate-weather-history' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/migrate-weather-history
          fetch-depth: 0

      - name: Aplicar correções
        run: |
          python - <<'PY'
          from pathlib import Path

          server = Path('src/lib/weather/history.server.ts')
          text = server.read_text(encoding='utf-8')
          old = 'days.length >= 25'
          if text.count(old) != 2:
              raise SystemExit(f'history.server.ts: esperado 2 ocorrências, encontrado {text.count(old)}')
          server.write_text(text.replace(old, 'days.length === HISTORY_DAYS'), encoding='utf-8')

          chart = Path('src/components/history/WeatherHistoryChart.tsx')
          text = chart.read_text(encoding='utf-8')
          replacements = [
              ('role="tablist"', 'role="group"'),
              ('              role="tab"\n              aria-selected={metric === value}', '              aria-pressed={metric === value}'),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'WeatherHistoryChart.tsx: esperado 1 trecho, encontrado {text.count(old)}: {old!r}')
              text = text.replace(old, new, 1)
          chart.write_text(text, encoding='utf-8')
          PY

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivos
        run: |
          npx prettier --write \
            src/lib/weather/history.server.ts \
            src/components/history/WeatherHistoryChart.tsx

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Publicar correções
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/weather/history.server.ts src/components/history/WeatherHistoryChart.tsx
          git commit -m "fix: trata série parcial e filtros acessíveis"
          git push origin HEAD:agent/migrate-weather-history
