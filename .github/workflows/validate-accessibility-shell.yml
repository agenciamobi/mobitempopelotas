name: Validar acessibilidade estrutural

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'agent/accessibility-shell' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/accessibility-shell
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Atualizar matriz de migração
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("MIGRATION_MATRIX.md")
          text = path.read_text(encoding="utf-8")
          old = "| 47 | Acessibilidade | Revisar | skip link, ARIA e semântica em componentes legados | todos os componentes migrados | Nenhuma | Preservar foco, teclado, contraste e informação além da cor | Alto | WCAG 2.2 AA nos fluxos principais e testes de teclado | Contínuo |"
          new = "| 47 | Acessibilidade | Parcial | skip link, ARIA e semântica em componentes legados | `src/components/layout/SiteLayout.tsx`, `Header.tsx`, `accessibility.css` e componentes migrados | Nenhuma | Skip link, foco após navegação, anúncio de rota, foco visível e movimento reduzido implementados; auditoria componente a componente permanece contínua | Médio | WCAG 2.2 AA nos fluxos principais e testes de teclado | Contínuo |"
          if text.count(old) != 1:
              raise SystemExit("Linha 47 da matriz não encontrada de forma única")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivos
        run: npx prettier --write src/components/layout/SiteLayout.tsx src/components/layout/accessibility.css

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Validar contrato estrutural
        run: |
          grep -q 'href="#conteudo-principal"' src/components/layout/Header.tsx
          grep -q 'aria-current={active ? "page" : undefined}' src/components/layout/Header.tsx
          grep -q 'aria-live="polite"' src/components/layout/SiteLayout.tsx
          grep -q 'mainRef.current?.focus({ preventScroll: true })' src/components/layout/SiteLayout.tsx
          grep -q 'prefers-reduced-motion: reduce' src/components/layout/accessibility.css
          grep -q 'a:focus-visible' src/components/layout/accessibility.css

      - name: Iniciar runtime SSR
        run: npm run dev -- --host 127.0.0.1 --port 3000 > /tmp/accessibility-shell.log 2>&1 &

      - name: Validar HTML SSR
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ > /tmp/home.html; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              cat /tmp/accessibility-shell.log
              exit 1
            fi
            sleep 1
          done
          grep -q 'class="skip-link"' /tmp/home.html
          grep -q 'href="#conteudo-principal"' /tmp/home.html
          grep -q 'id="conteudo-principal"' /tmp/home.html
          grep -q 'tabindex="-1"' /tmp/home.html
          grep -q 'aria-live="polite"' /tmp/home.html
          grep -q 'aria-current="page"' /tmp/home.html

      - name: Publicar formatação e matriz
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MIGRATION_MATRIX.md src/components/layout
          git commit -m "feat: melhora acessibilidade estrutural"
          git push origin HEAD:agent/accessibility-shell
