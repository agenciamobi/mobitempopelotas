name: Restaurar registro TanStack Start

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/restore-routetree-once.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Restaurar bloco de registro
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/routeTree.gen.ts")
          content = path.read_text(encoding="utf-8").rstrip()
          marker = "declare module '@tanstack/react-start'"
          if marker not in content:
              content += """

import type { getRouter } from './router.tsx'
import type { startInstance } from './start.ts'
declare module '@tanstack/react-start' {
  interface Register {
    ssr: true
    router: Awaited<ReturnType<typeof getRouter>>
    config: Awaited<ReturnType<typeof startInstance.getOptions>>
  }
}
"""
          path.write_text(content, encoding="utf-8")
          PY

      - name: Commitar somente a árvore restaurada
        run: |
          if git diff --quiet -- src/routeTree.gen.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/routeTree.gen.ts
          git commit -m "chore: restaura registro do TanStack Start"
          git push origin HEAD:main
