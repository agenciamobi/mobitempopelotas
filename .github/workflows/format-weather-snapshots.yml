name: Formatar lote de snapshots

on:
  push:
    branches:
      - agent/weather-history-snapshots
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: format-weather-snapshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Aplicar Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Formatar arquivos do lote
        run: |
          npx prettier --write \
            src/lib/supabase/database.types.ts \
            src/lib/weather/history.functions.ts \
            src/lib/weather/history-with-snapshots.server.ts \
            src/lib/weather/weather-snapshot-store.server.ts \
            src/routes/api/cron/weather-snapshot.ts

      - name: Versionar formatação
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/supabase/database.types.ts src/lib/weather src/routes/api/cron/weather-snapshot.ts
          if git diff --cached --quiet; then
            echo "Arquivos já estão formatados."
          else
            git commit -m "style: normaliza lote de snapshots"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
