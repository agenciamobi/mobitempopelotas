name: Canonicalizar domínio oficial

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  canonicalize-domain:
    if: github.head_ref == 'agent/canonical-domain-seo' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/canonical-domain-seo

      - name: Ajustar regras de limpeza
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/canonicalize-production-domain.py")
          content = path.read_text(encoding="utf-8")
          content = content.replace(
              "        (LEGACY_PROJECT_HOST, CANONICAL_HOST),\n        (WWW_HOST, CANONICAL_HOST),",
              "        (LEGACY_PROJECT_HOST, CANONICAL_HOST),\n        (PLATFORM_DOMAIN, CANONICAL_HOST),\n        (WWW_HOST, CANONICAL_HOST),",
          )
          content = content.replace(
              'const legacyHost = ["mobitempopelotas", "lovable", "app"].join(".");',
              'const legacyHost = ["mobitempopelotas", "lovable", "app"].join(".");\nconst wwwHost = ["www", "tempopelotas", "com", "br"].join(".");',
          )
          content = content.replace(
              'getCanonicalRedirectUrl("https://www.tempopelotas.com.br/alertas")',
              'getCanonicalRedirectUrl(`https://${wwwHost}/alertas`)',
          )
          content = content.replace(
              'assert.equal(sitemap.includes("www.tempopelotas.com.br"), false);',
              'assert.equal(sitemap.includes(wwwHost), false);',
          )
          path.write_text(content, encoding="utf-8")
          PY

      - name: Aplicar domínio canônico e regras SEO
        run: python scripts/canonicalize-production-domain.py

      - name: Simplificar contrato das URLs do sitemap
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/seo-domain.test.ts")
          content = path.read_text(encoding="utf-8")
          start = "  for (const route of PUBLIC_ROUTES) {\n"
          end = "  }\n});\n"
          before, separator, remainder = content.partition(start)
          if not separator:
              raise SystemExit("Laço de validação do sitemap não encontrado")
          _, separator, after = remainder.partition(end)
          if not separator:
              raise SystemExit("Fim do contrato do sitemap não encontrado")
          replacement = (
              "  for (const route of PUBLIC_ROUTES) {\n"
              "    assert.equal(sitemap.includes(`<loc>${absoluteUrl(route.path)}</loc>`), true);\n"
              "  }\n});\n"
          )
          path.write_text(before + replacement + after, encoding="utf-8")
          PY

      - name: Formatar arquivos alterados
        run: |
          npm ci
          npx prettier --write \
            src/lib/site-config.ts \
            src/lib/canonical-host.ts \
            src/lib/sitemap.ts \
            src/server.ts \
            src/components/cameras/CameraPage.tsx \
            'src/routes/sitemap[.]xml.ts' \
            tests/seo-domain.test.ts \
            package.json

      - name: Validar ausência de domínios obsoletos
        run: |
          if git grep -n 'lovable\.app'; then
            echo 'Foi encontrada referência ao domínio de plataforma.' >&2
            exit 1
          fi
          if git grep -n 'www\.tempopelotas\.com\.br'; then
            echo 'Foi encontrada referência à variante www.' >&2
            exit 1
          fi

      - name: Commitar resultado
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "seo: consolida domínio oficial e sitemap"
          git push origin HEAD:agent/canonical-domain-seo
