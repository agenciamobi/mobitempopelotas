name: Aplicar transparência do Laranjal

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/show-laranjal-reading-age
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Aplicar ajuste
        run: python .github/scripts/apply-laranjal-reading-age.py

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivos alterados
        run: |
          npx prettier --write \
            src/lib/hydrology/laranjal-level.server.ts \
            src/components/hydrology/HydrologyPages.tsx

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Publicar ajuste na branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/hydrology/laranjal-level.server.ts src/components/hydrology/HydrologyPages.tsx
          git commit -m "fix: informa idade da leitura do Laranjal"
          git push origin HEAD:agent/show-laranjal-reading-age
