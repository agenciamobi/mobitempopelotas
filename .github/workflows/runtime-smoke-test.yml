name: Smoke test da produção

on:
  push:
    branches:
      - agent/runtime-smoke-test
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  production-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verificar fontes e rotas publicadas
        shell: bash
        run: |
          set -uo pipefail
          BASE_URL="https://mobitempopelotas.lovable.app"
          OPEN_METEO_URL="https://api.open-meteo.com/v1/forecast?latitude=-31.7654&longitude=-52.3376&timezone=America%2FSao_Paulo&forecast_days=7&current=temperature_2m%2Crelative_humidity_2m%2Capparent_temperature%2Cweather_code%2Cpressure_msl%2Cvisibility%2Cwind_speed_10m%2Cwind_gusts_10m%2Cwind_direction_10m%2Cis_day&hourly=temperature_2m%2Cprecipitation_probability%2Cwind_speed_10m%2Cwind_gusts_10m%2Cweather_code%2Cis_day&daily=weather_code%2Ctemperature_2m_max%2Ctemperature_2m_min%2Cprecipitation_probability_max%2Cprecipitation_sum%2Cwind_gusts_10m_max%2Csunrise%2Csunset"
          MET_NORWAY_URL="https://api.met.no/weatherapi/locationforecast/2.0/complete?lat=-31.7654&lon=-52.3376&altitude=7"
          LOG_FILE="smoke-artifacts/smoke-production.log"
          FAILED=0
          mkdir -p smoke-artifacts

          echo "Smoke test iniciado em $(date -u +'%Y-%m-%dT%H:%M:%SZ')" | tee "$LOG_FILE"

          source_metrics="$(curl --silent --show-error --max-time 20 \
            --output smoke-artifacts/open-meteo.json \
            --write-out '%{http_code}|%{time_total}' \
            "$OPEN_METEO_URL" || echo '000|20')"
          echo "Open-Meteo direto: $source_metrics" | tee -a "$LOG_FILE"
          if [[ "${source_metrics%%|*}" != "200" ]]; then
            echo "ERRO: Open-Meteo não respondeu diretamente" | tee -a "$LOG_FILE"
            FAILED=1
          elif ! jq -e '.current.temperature_2m != null and (.daily.time | length) > 0' smoke-artifacts/open-meteo.json >/dev/null; then
            echo "ERRO: payload direto do Open-Meteo sem previsão utilizável" | tee -a "$LOG_FILE"
            FAILED=1
          else
            echo "OK: Open-Meteo direto possui condições e previsão diária" | tee -a "$LOG_FILE"
          fi

          met_metrics="$(curl --silent --show-error --max-time 20 \
            --user-agent 'MOBI-Tempo-Pelotas/1.0 https://agenciamobi.com.br' \
            --output smoke-artifacts/met-norway.json \
            --write-out '%{http_code}|%{time_total}' \
            "$MET_NORWAY_URL" || echo '000|20')"
          echo "MET Norway completo: $met_metrics" | tee -a "$LOG_FILE"
          if [[ "${met_metrics%%|*}" != "200" ]]; then
            echo "ERRO: MET Norway não respondeu diretamente" | tee -a "$LOG_FILE"
            FAILED=1
          elif ! jq -e '.properties.timeseries[0].data.instant.details.air_temperature != null and (.properties.timeseries | length) > 24' smoke-artifacts/met-norway.json >/dev/null; then
            echo "ERRO: payload do MET Norway sem previsão utilizável" | tee -a "$LOG_FILE"
            FAILED=1
          else
            echo "OK: MET Norway possui previsão global utilizável" | tee -a "$LOG_FILE"
            jq -r '[.properties.timeseries[].data.next_1_hours.details.probability_of_precipitation?, .properties.timeseries[].data.next_6_hours.details.probability_of_precipitation?, .properties.timeseries[].data.next_12_hours.details.probability_of_precipitation?] | map(select(. != null)) | "Probabilidades disponíveis: \(length)"' smoke-artifacts/met-norway.json | tee -a "$LOG_FILE"
          fi

          auth_metrics="$(curl --silent --show-error --max-time 15 \
            --header 'Content-Type: application/json' \
            --data '{\"publicId\":\"0a869e80-d9e8-11f0-ac7c-456d9a25fe9a\"}' \
            --output smoke-artifacts/laranjal-auth.json \
            --write-out '%{http_code}|%{time_total}' \
            'https://tb.labhidrosens.com/api/auth/login/public' || echo '000|15')"
          echo "LabHidroSens autenticação pública: $auth_metrics" | tee -a "$LOG_FILE"

          check_route() {
            local path="$1"
            local expected="$2"
            local slug="$3"
            local body="smoke-artifacts/${slug}.html"
            local metrics
            local status
            local duration

            metrics="$(curl -L --silent --show-error --max-time 40 \
              --output "$body" \
              --write-out '%{http_code}|%{time_total}' \
              "$BASE_URL$path" || echo '000|40')"
            status="${metrics%%|*}"
            duration="${metrics##*|}"

            printf '%-42s HTTP %-3s %ss\n' "$path" "$status" "$duration" | tee -a "$LOG_FILE"

            if [[ "$status" != "200" ]]; then
              echo "ERRO: status inesperado em $path" | tee -a "$LOG_FILE"
              FAILED=1
            elif ! grep -Fq "$expected" "$body"; then
              echo "ERRO: conteúdo esperado não encontrado: $expected" | tee -a "$LOG_FILE"
              FAILED=1
            else
              echo "OK: conteúdo validado" | tee -a "$LOG_FILE"
            fi

            if [[ "$path" == "/" ]] && grep -Fq "Dados temporariamente indisponíveis" "$body"; then
              echo "ERRO: Home entrou no estado de indisponibilidade total" | tee -a "$LOG_FILE"
              FAILED=1
            fi
          }

          check_route "/" "Tempo e águas em Pelotas" "home"
          check_route "/tempo-hoje-pelotas" "Previsão de hoje" "tempo-hoje"
          check_route "/previsao-7-dias-pelotas" "Previsão do tempo para os próximos 7 dias" "sete-dias"
          check_route "/chuva-em-pelotas" "Quando e quanto pode chover" "chuva"
          check_route "/vento-em-pelotas" "Velocidade, direção e rajadas previstas" "vento"
          check_route "/alertas" "Alertas meteorológicos para Pelotas e região" "alertas"
          check_route "/situacao-hidrologica-pelotas" "Situação das águas no Laranjal" "aguas"
          check_route "/nivel-da-lagoa-dos-patos-laranjal" "Nível da Lagoa dos Patos na Estação Laranjal" "nivel-laranjal"
          check_route "/metodologia" "De onde vêm os dados do Tempo Pelotas" "metodologia"
          check_route "/estacao-embrapa-pelotas" "Estação Embrapa Clima Temperado" "estacao-embrapa"

          if grep -Fq "Página em migração" smoke-artifacts/metodologia.html; then
            echo "ERRO: Metodologia ainda exibe o placeholder de migração" | tee -a "$LOG_FILE"
            FAILED=1
          elif ! grep -Fq "Quem fornece cada informação" smoke-artifacts/metodologia.html; then
            echo "ERRO: Metodologia sem seção de fontes" | tee -a "$LOG_FILE"
            FAILED=1
          elif ! grep -Fq "Como evitamos apresentar certezas falsas" smoke-artifacts/metodologia.html; then
            echo "ERRO: Metodologia sem regras de integridade" | tee -a "$LOG_FILE"
            FAILED=1
          else
            echo "OK: Metodologia completa e sem placeholder" | tee -a "$LOG_FILE"
          fi

          if grep -Fq "Página em migração" smoke-artifacts/estacao-embrapa.html; then
            echo "ERRO: Estação Embrapa ainda exibe o placeholder de migração" | tee -a "$LOG_FILE"
            FAILED=1
          elif ! grep -Fq "Como estes dados entram no portal" smoke-artifacts/estacao-embrapa.html; then
            echo "ERRO: Estação Embrapa sem contexto de proveniência" | tee -a "$LOG_FILE"
            FAILED=1
          elif ! grep -Eq "Leituras reconhecidas|Leitura parcial|Leitura atrasada|Medições indisponíveis" smoke-artifacts/estacao-embrapa.html; then
            echo "ERRO: Estação Embrapa sem estado explícito da fonte" | tee -a "$LOG_FILE"
            FAILED=1
          elif grep -Fq "Medições indisponíveis" smoke-artifacts/estacao-embrapa.html; then
            if ! grep -Fq "As medições não puderam ser exibidas agora" smoke-artifacts/estacao-embrapa.html; then
              echo "ERRO: Indisponibilidade da Embrapa sem explicação ao usuário" | tee -a "$LOG_FILE"
              FAILED=1
            else
              echo "OK: Estação Embrapa completa, com indisponibilidade externa explícita" | tee -a "$LOG_FILE"
            fi
          elif ! grep -Fq "Chuva acumulada na estação" smoke-artifacts/estacao-embrapa.html; then
            echo "ERRO: Estação Embrapa disponível sem acumulados de chuva" | tee -a "$LOG_FILE"
            FAILED=1
          elif ! grep -Fq "Menores e maiores valores reconhecidos" smoke-artifacts/estacao-embrapa.html; then
            echo "ERRO: Estação Embrapa disponível sem extremos diários" | tee -a "$LOG_FILE"
            FAILED=1
          else
            echo "OK: Estação Embrapa completa, com medições e sem placeholder" | tee -a "$LOG_FILE"
          fi

          echo "Smoke test finalizado em $(date -u +'%Y-%m-%dT%H:%M:%SZ')" | tee -a "$LOG_FILE"
          exit "$FAILED"

      - name: Publicar relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-production-report
          path: smoke-artifacts
          if-no-files-found: error
          retention-days: 2