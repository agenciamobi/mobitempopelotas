name: Formatar runbook de cutover

on:
  push:
    branches:
      - agent/production-cutover-runbook

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[cutover-format]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-cutover-runbook

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-audit --no-fund
      - run: npx prettier --write scripts/cutover-smoke.mjs package.json

      - name: Publicar formatação
        run: |
          rm .github/workflows/format-cutover-runbook.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/cutover-smoke.mjs package.json .github/workflows/format-cutover-runbook.yml
          git commit -m "[cutover-format] normaliza smoke test operacional"
          git push origin HEAD:agent/production-cutover-runbook
