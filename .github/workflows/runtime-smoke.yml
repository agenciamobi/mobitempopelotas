name: Runtime Lovable

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: runtime-lovable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Capturar homepage publicada
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capturar HTML
        env:
          BASE_URL: https://mobitempopelotas.lovable.app
        run: |
          mkdir -p artifacts/exact-production-live
          printf '{}\n' > artifacts/exact-production-live/summary.json
          curl \
            --fail \
            --location \
            --retry 24 \
            --retry-all-errors \
            --retry-delay 10 \
            --connect-timeout 20 \
            --max-time 300 \
            --user-agent 'TempoPelotas-Exact-Port-Debug/2.0' \
            --output artifacts/exact-production-live/home.html \
            "$BASE_URL/"

      - name: Analisar estrutura publicada
        run: |
          python <<'PY'
          import json
          import re
          from datetime import datetime, timezone
          from pathlib import Path

          html_path = Path("artifacts/exact-production-live/home.html")
          summary_path = Path("artifacts/exact-production-live/summary.json")
          html = html_path.read_text(errors="replace") if html_path.exists() else ""
          markers = [
              "site-shell--home-editorial",
              "weather-hero",
              "home-section-navigation",
              "home-story--forecast",
              "home-story--map",
              "home-story--observation",
              "home-story--water",
              "site-footer",
              "Veja como o tempo deve mudar ao longo do dia",
              "Do Guaíba à Lagoa dos Patos",
              "Rede da Lagoa dos Patos",
              "Nível do Guaíba",
              "Informação local para acompanhar o dia",
          ]
          results = {marker: marker in html for marker in markers}
          missing = [marker for marker, present in results.items() if not present]
          title_match = re.search(r"<title>([^<]*)</title>", html, re.I)
          summary = {
              "capturedAt": datetime.now(timezone.utc).isoformat(),
              "htmlLength": len(html),
              "title": title_match.group(1) if title_match else None,
              "results": results,
              "missing": missing,
          }
          summary_path.write_text(json.dumps(summary, ensure_ascii=False, indent=2) + "\n")
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          if missing:
              raise SystemExit("Marcadores ausentes: " + " | ".join(missing))
          PY

      - name: Publicar captura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-production-live-${{ github.run_number }}
          path: artifacts/exact-production-live
          if-no-files-found: error
          retention-days: 14
