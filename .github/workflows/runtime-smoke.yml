name: Runtime Lovable

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: runtime-lovable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Capturar homepage publicada
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capturar e analisar HTML
        env:
          BASE_URL: https://mobitempopelotas.lovable.app
        run: |
          mkdir -p artifacts/exact-production-live
          node <<'NODE'
          const { writeFile } = require("node:fs/promises");
          const baseUrl = process.env.BASE_URL.replace(/\/$/, "");
          const wait = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));
          const markers = [
            "site-shell--home-editorial",
            "weather-hero",
            "home-section-navigation",
            "home-story--forecast",
            "home-story--map",
            "home-story--observation",
            "home-story--water",
            "site-footer",
            "Veja como o tempo deve mudar ao longo do dia",
            "Do Guaíba à Lagoa dos Patos",
            "Rede da Lagoa dos Patos",
            "Nível do Guaíba",
            "Informação local para acompanhar o dia",
          ];

          let response;
          let html = "";
          for (let attempt = 1; attempt <= 24; attempt += 1) {
            response = await fetch(`${baseUrl}/`, {
              headers: {
                Accept: "text/html",
                "User-Agent": "TempoPelotas-Exact-Port-Debug/1.0",
              },
              signal: AbortSignal.timeout(25_000),
            });
            html = await response.text();
            if (response.ok && html.includes("site-shell--home-editorial")) break;
            console.log(`Tentativa ${attempt}/24: HTTP ${response.status}; shell literal ainda ausente.`);
            if (attempt < 24) await wait(10_000);
          }

          const results = Object.fromEntries(markers.map((marker) => [marker, html.includes(marker)]));
          const missing = markers.filter((marker) => !results[marker]);
          const summary = {
            capturedAt: new Date().toISOString(),
            baseUrl,
            status: response?.status ?? null,
            htmlLength: html.length,
            title: html.match(/<title>([^<]*)<\/title>/i)?.[1] ?? null,
            results,
            missing,
          };

          await writeFile("artifacts/exact-production-live/home.html", html);
          await writeFile(
            "artifacts/exact-production-live/summary.json",
            `${JSON.stringify(summary, null, 2)}\n`,
          );

          console.log(JSON.stringify(summary, null, 2));
          if (!response?.ok) throw new Error(`Homepage respondeu HTTP ${response?.status ?? "desconhecido"}.`);
          if (missing.length > 0) throw new Error(`Marcadores ausentes: ${missing.join(" | ")}`);
          NODE

      - name: Publicar captura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-production-live-${{ github.run_number }}
          path: artifacts/exact-production-live
          if-no-files-found: error
          retention-days: 14
