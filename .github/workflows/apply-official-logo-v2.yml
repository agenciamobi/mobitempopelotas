name: Aplicar logotipos oficiais v2

on:
  push:
    branches:
      - agent/apply-official-logo

permissions:
  contents: write

jobs:
  apply-logo:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Gravar ativos oficiais
        run: |
          mkdir -p public/brand
          base64 --decode .github/logo-assets/tempo-pelotas-primary.svg.gz.b64 | gzip --decompress > public/brand/tempo-pelotas-primary.svg
          base64 --decode .github/logo-assets/tempo-pelotas-purple.svg.gz.b64 | gzip --decompress > public/brand/tempo-pelotas-purple.svg
          cp public/brand/tempo-pelotas-primary.svg public/brand/tempo-pelotas-header.svg

      - name: Atualizar componentes e estilos
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              content = file.read_text()
              if old not in content:
                  raise SystemExit(f"Bloco esperado não encontrado em {path}")
              file.write_text(content.replace(old, new, 1))

          replace_once(
              "src/components/layout/Header.tsx",
              '''              <span className="production-brand-wordmark">
                <strong>TEMPO</strong>
                <em>Pelotas</em>
              </span>''',
              '''              <img
                className="production-brand-logo"
                src="/brand/tempo-pelotas-header"
                alt=""
                width={10694}
                height={1552}
                draggable={false}
              />''',
          )

          header_css = Path("src/components/layout/Header.css")
          content = header_css.read_text()
          pattern = re.compile(
              r'''\.production-brand-wordmark \{.*?\}\n\n\.production-brand-wordmark strong \{.*?\}\n\n\.production-brand-wordmark em \{.*?\}''',
              re.S,
          )
          replacement = '''.production-brand-logo {
            display: block;
            width: clamp(132px, 12vw, 166px);
            height: auto;
          }'''
          content, count = pattern.subn(replacement, content, count=1)
          if count != 1:
              raise SystemExit("Estilos antigos da marca do header não encontrados")
          header_css.write_text(content)

          replace_once(
              "src/components/layout/Footer.tsx",
              '''              <strong>TEMPO</strong>
              <em>Pelotas</em>''',
              '''              <img
                className="editorial-footer-brand-logo"
                src="/brand/tempo-pelotas-header"
                alt=""
                width={10694}
                height={1552}
                loading="lazy"
                draggable={false}
              />''',
          )

          footer_css = Path("src/components/layout/Footer.css")
          content = footer_css.read_text()
          pattern = re.compile(
              r'''\.editorial-footer-brand \{.*?\}\n\n\.editorial-footer-brand strong \{.*?\}\n\n\.editorial-footer-brand em \{.*?\}''',
              re.S,
          )
          replacement = '''.editorial-footer-brand {
            display: inline-flex;
            width: fit-content;
            max-width: 100%;
            align-items: center;
            border-radius: 10px;
            color: var(--footer-ink);
          }

          .editorial-footer-brand-logo {
            display: block;
            width: clamp(210px, 24vw, 330px);
            max-width: 100%;
            height: auto;
          }'''
          content, count = pattern.subn(replacement, content, count=1)
          if count != 1:
              raise SystemExit("Estilos antigos da marca do footer não encontrados")
          footer_css.write_text(content)

          replace_once(
              "src/production/components/site-header.tsx",
              '''              width={11349}
              height={1552}''',
              '''              width={10694}
              height={1552}''',
          )

          replace_once(
              "src/production/components/site-footer.tsx",
              '''                width={900}
                height={180}''',
              '''                width={10694}
                height={1552}''',
          )

          Path("public/brand/README.md").write_text('''# Identidade Tempo Pelotas

- `tempo-pelotas-primary.svg`: assinatura principal em ciano.
- `tempo-pelotas-purple.svg`: variação institucional em roxo.
- `tempo-pelotas-header.svg`: alias compatível da versão principal usado pelo portal.

As três versões preservam desenho vetorial e fundo transparente. A assinatura ciano é a aplicação padrão nos cabeçalhos e rodapés.
''')
          PY

          npx prettier --write \
            src/components/layout/Header.tsx \
            src/components/layout/Header.css \
            src/components/layout/Footer.tsx \
            src/components/layout/Footer.css \
            src/production/components/site-header.tsx \
            src/production/components/site-footer.tsx \
            public/brand/README.md

      - name: Commitar aplicação da marca
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/brand src/components/layout src/production/components/site-header.tsx src/production/components/site-footer.tsx
          git commit -m "brand: aplica logotipos oficiais do Tempo Pelotas"
          git push origin HEAD:agent/apply-official-logo
