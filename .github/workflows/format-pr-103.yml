name: Formatar arquivos do PR 103

on:
  push:
    branches:
      - agent/account-lgpd-rights

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do branch
        uses: actions/checkout@v4
        with:
          ref: agent/account-lgpd-rights
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Aplicar Prettier somente no escopo corrigido
        run: >-
          npx prettier --write
          src/components/auth/AccountPage.tsx
          src/lib/auth/request-user.server.ts
          src/lib/push/push-storage.server.ts
          src/lib/push/web-push.server.ts
          src/routes/api/cron/push-daily.ts
          src/routes/privacidade-e-dados.tsx

      - name: Registrar formatação
        run: |
          if git diff --quiet; then
            echo "Nenhuma alteração de formatação."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/components/auth/AccountPage.tsx \
            src/lib/auth/request-user.server.ts \
            src/lib/push/push-storage.server.ts \
            src/lib/push/web-push.server.ts \
            src/routes/api/cron/push-daily.ts \
            src/routes/privacidade-e-dados.tsx
          git commit -m "style: formatar correções do PR 103"
          git push origin HEAD:agent/account-lgpd-rights
