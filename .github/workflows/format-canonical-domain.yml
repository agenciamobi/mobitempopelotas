name: Formatar canonicalização

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/canonical-domain-seo' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/canonical-domain-seo

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Formatar arquivos alterados
        run: |
          npx prettier --write \
            package.json \
            scripts/cutover-smoke.mjs \
            scripts/runtime-readiness.mjs \
            scripts/visual-parity-audit.mjs \
            src/components/cameras/CameraPage.tsx \
            src/lib/canonical-host.ts \
            src/lib/site-config.ts \
            src/lib/sitemap.ts \
            src/lib/weather/cppmet.server.ts \
            src/lib/weather/embrapa.server.ts \
            src/lib/weather/inmet.server.ts \
            'src/routes/sitemap[.]xml.ts' \
            src/server.ts \
            tests/runtime-readiness.test.ts \
            tests/seo-domain.test.ts

      - name: Commitar formatação
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json scripts src tests
          git commit -m "style: formata canonicalização do domínio"
          git push origin HEAD:agent/canonical-domain-seo
