name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Testes, build, rotas, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Contratos rápidos
        run: npm run test:contracts

      - name: Build de produção
        run: npm run build

      - name: Contrato da árvore de rotas
        env:
          ROUTE_TREE_REQUIRED: "1"
        run: npm run test:routes

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
