name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Corrigir extensão do logotipo
        run: |
          cp public/brand/tempo-pelotas-header public/brand/tempo-pelotas-header.svg
          sed -i 's#/brand/tempo-pelotas-header"#/brand/tempo-pelotas-header.svg"#g' \
            src/production/components/site-header.tsx \
            src/production/components/site-footer.tsx
          npx prettier --write \
            src/production/components/site-header.tsx \
            src/production/components/site-footer.tsx \
            public/brand/tempo-pelotas-header.svg

      - name: Publicar arquivos corrigidos
        uses: actions/upload-artifact@v4
        with:
          name: corrected-brand-files
          path: |
            src/production/components/site-header.tsx
            src/production/components/site-footer.tsx
            public/brand/tempo-pelotas-header.svg
          if-no-files-found: error
          retention-days: 1

      - name: Build de produção
        run: npm run build

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
