name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivos de auditoria
        run: |
          npx prettier --write \
            scripts/visual-parity-audit.mjs \
            src/production/ProductionHome.tsx

      - name: Publicar arquivos formatados
        uses: actions/upload-artifact@v4
        with:
          name: formatted-audit-files
          path: |
            scripts/visual-parity-audit.mjs
            src/production/ProductionHome.tsx
          if-no-files-found: error
          retention-days: 1

      - name: Capturar ESLint
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint 2>&1 | tee lint-report.txt
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publicar relatório do ESLint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-audit-report
          path: lint-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Build de produção
        run: npm run build

      - name: TypeScript
        run: npm run typecheck

      - name: Falhar quando o ESLint encontrar problemas
        if: steps.lint.outputs.status != '0'
        run: exit 1
