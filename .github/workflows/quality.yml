name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Finalizar lote web push
        if: github.event_name == 'push' && github.ref == 'refs/heads/agent/web-push-notifications'
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("src/components/pwa/PushNotificationsManager.tsx")
          content = path.read_text(encoding="utf-8")
          old = '''    const previousElement = document.activeElement as HTMLElement | null;
    const previousOverflow = document.body.style.overflow;'''
          new = '''    const previousElement = document.activeElement as HTMLElement | null;
    const launcherElement = launcherRef.current;
    const previousOverflow = document.body.style.overflow;'''
          if old not in content:
              raise SystemExit("Trecho inicial do efeito não encontrado")
          content = content.replace(old, new, 1)
          old_cleanup = '''      window.requestAnimationFrame(() => (previousElement ?? launcherRef.current)?.focus());'''
          new_cleanup = '''      window.requestAnimationFrame(() => (previousElement ?? launcherElement)?.focus());'''
          if old_cleanup not in content:
              raise SystemExit("Trecho de limpeza do efeito não encontrado")
          path.write_text(content.replace(old_cleanup, new_cleanup, 1), encoding="utf-8")
          PY
          npx prettier --write src/components/pwa/PushNotificationsManager.tsx
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/pwa/PushNotificationsManager.tsx
          if ! git diff --cached --quiet; then
            git commit -m "fix: estabiliza retorno de foco dos avisos"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Build de produção
        run: npm run build

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
