name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivos alterados para diagnóstico
        run: |
          npx prettier --write \
            scripts/visual-parity-audit.mjs \
            src/production/ProductionHome.tsx \
            .github/workflows/visual-parity.yml

      - name: Publicar arquivos formatados
        uses: actions/upload-artifact@v4
        with:
          name: formatted-pr-files
          path: |
            scripts/visual-parity-audit.mjs
            src/production/ProductionHome.tsx
            .github/workflows/visual-parity.yml
          if-no-files-found: error
          retention-days: 1

      - name: Build de produção
        run: npm run build

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
