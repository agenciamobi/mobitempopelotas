name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck, lint e build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Validar TypeScript
        run: npm run typecheck

      - name: Validar ESLint
        run: npm run lint

      - name: Gerar build de produção
        run: npm run build
