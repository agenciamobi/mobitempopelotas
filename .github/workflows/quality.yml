name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Testes, build, rotas, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivos diagnosticados
        if: github.event_name == 'push' && github.ref == 'refs/heads/agent/internal-editorial-shell'
        run: |
          npx prettier --write \
            src/lib/push/push-http.server.ts \
            src/lib/push/push-storage.server.ts \
            src/lib/weather/aggregated-weather.types.ts \
            src/lib/weather/types.ts \
            src/lib/weather/weather-intelligence.types.ts \
            src/production/components/weather-map.tsx \
            src/production/lib/weather-data.ts \
            src/components/layout/SiteLayout.tsx
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/lib/push/push-http.server.ts \
            src/lib/push/push-storage.server.ts \
            src/lib/weather/aggregated-weather.types.ts \
            src/lib/weather/types.ts \
            src/lib/weather/weather-intelligence.types.ts \
            src/production/components/weather-map.tsx \
            src/production/lib/weather-data.ts \
            src/components/layout/SiteLayout.tsx
          git commit -m "style: aplica formatação validada pelo Prettier"
          git push origin HEAD:agent/internal-editorial-shell

      - name: Validar template de ambiente
        run: npm run runtime:check:example

      - name: Contratos rápidos
        run: npm run test:contracts

      - name: Build de produção
        run: npm run build

      - name: Contrato da árvore de rotas
        env:
          ROUTE_TREE_REQUIRED: "1"
        run: npm run test:routes

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
