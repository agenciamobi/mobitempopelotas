name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Build de produção
        run: npm run build

      - name: TypeScript
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck-report.txt

      - name: Publicar diagnóstico do TypeScript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-hydrology-consolidation
          path: typecheck-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Falhar quando o TypeScript falhar
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: ESLint
        run: npm run lint
