name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-editorial:
    if: github.event_name == 'push' && github.ref == 'refs/heads/agent/restore-editorial-hero'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/restore-editorial-hero

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Aplicar Prettier
        run: npx prettier --write src/components/weather/WeatherEditorialHero.tsx src/components/weather/WeatherEditorialHero.css src/components/weather/WeatherHome.tsx

      - name: Registrar formatação
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/weather/WeatherEditorialHero.tsx src/components/weather/WeatherEditorialHero.css src/components/weather/WeatherHome.tsx
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de formatação."
          else
            git commit -m "style: aplica formatação ao hero editorial"
            git push origin HEAD:agent/restore-editorial-hero
          fi

  validate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build
            command: npm run build
          - name: Typecheck
            command: npm run build && npm run typecheck
          - name: Lint
            command: npm run lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Executar ${{ matrix.name }}
        run: ${{ matrix.command }}
