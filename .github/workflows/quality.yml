name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Build de produção
        run: npm run build

      - name: TypeScript
        shell: bash
        run: |
          mkdir -p artifacts/typecheck
          set +e
          npm run typecheck 2>&1 | tee artifacts/typecheck/output.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Publicar diagnóstico TypeScript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-${{ github.run_number }}
          path: artifacts/typecheck
          if-no-files-found: warn
          retention-days: 2

      - name: ESLint
        run: npm run lint
