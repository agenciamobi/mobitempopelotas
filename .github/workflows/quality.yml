name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Transplantar e validar produção
    if: ${{ !contains(github.event.head_commit.message, '[exact-production-port]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/exact-production-port

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Materializar script de transplante
        run: |
          python <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/exact-production-port.yml').read_text()
          section = workflow.split('- name: Copiar componentes e estilos da produção', 1)[1]
          start = section.index("          from pathlib import Path\n")
          end = section.index("\n          PY\n", start)
          embedded = section[start:end]
          script = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in embedded.splitlines()
          )
          Path('/tmp/exact-production-port.py').write_text(script + "\n")
          print(f'Script materializado com {len(script.splitlines())} linhas.')
          PY

      - name: Executar transplante literal
        run: python /tmp/exact-production-port.py

      - name: Instalar MapLibre usado pela produção
        run: npm install maplibre-gl@5.24.0 --save --no-audit --no-fund

      - name: Formatar
        run: npx prettier --write src/production src/routes/index.tsx src/components/layout/SiteLayout.tsx package.json package-lock.json

      - name: Build de produção
        run: npm run build

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Publicar transplante validado
        run: |
          git show origin/main:.github/workflows/quality.yml > .github/workflows/quality.yml
          rm -f .github/workflows/exact-production-port.yml PORT_EXACT_PRODUCTION.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[exact-production-port] porta homepage literal da produção"
          git push origin HEAD:agent/exact-production-port
