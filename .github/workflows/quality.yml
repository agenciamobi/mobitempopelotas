name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build
            command: npm run build
          - name: Typecheck
            command: npm run build && npm run typecheck
          - name: Lint
            command: npm run lint > lint-editorial.log 2>&1 || true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Executar ${{ matrix.name }}
        run: ${{ matrix.command }}

      - name: Publicar relatório do lint
        if: matrix.name == 'Lint'
        uses: actions/upload-artifact@v4
        with:
          name: lint-editorial-report
          path: lint-editorial.log
          if-no-files-found: error
          retention-days: 1
