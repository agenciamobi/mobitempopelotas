name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Consolidar CSS e validar
    if: ${{ !contains(github.event.head_commit.message, '[direct-production-css]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/direct-production-css-bundle

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Consolidar pilha CSS em arquivo direto
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          legacy_layout = (root / '_legacy' / 'app' / 'layout.tsx').read_text()
          names = re.findall(r'import "\./([^"\n]+\.css)";', legacy_layout)
          styles_dir = root / 'src' / 'production' / 'styles'
          chunks = [
              '/*',
              ' * CSS consolidado da homepage de produção.',
              ' * Ordem idêntica ao app/layout.tsx de agenciamobi/tempopelotas.',
              ' */',
              '',
          ]

          for name in names:
              path = styles_dir / name
              if not path.exists():
                  raise SystemExit(f'CSS ausente: {path}')
              content = path.read_text()
              if name == 'globals.css':
                  content = re.sub(r'^@import\s+["\']tailwindcss["\'];\s*', '', content, count=1)
              chunks.extend([
                  f'/* ===== {name} ===== */',
                  content.rstrip(),
                  '',
              ])

          bundle_path = root / 'src' / 'production' / 'production.css'
          bundle_path.write_text('\n'.join(chunks) + '\n')

          home_path = root / 'src' / 'production' / 'ProductionHome.tsx'
          home = home_path.read_text().replace('import "./production-styles";', 'import "./production.css";')
          if 'import "./production.css";' not in home:
              raise SystemExit('Import direto de production.css não foi aplicado.')
          home_path.write_text(home)

          intermediary = root / 'src' / 'production' / 'production-styles.ts'
          if intermediary.exists():
              intermediary.unlink()

          print(f'CSS consolidado: {len(names)} arquivos, {bundle_path.stat().st_size} bytes.')
          PY

      - name: Formatar arquivos de código
        run: npx prettier --write src/production/ProductionHome.tsx

      - name: Build de produção
        run: npm run build

      - name: Confirmar regras no bundle final
        run: |
          python <<'PY'
          from pathlib import Path

          css_files = []
          for directory in [Path('.output'), Path('dist'), Path('build')]:
              if directory.exists():
                  css_files.extend(directory.rglob('*.css'))

          combined = '\n'.join(path.read_text(errors='replace') for path in css_files)
          required = {
              '.mobile-tab-bar': 1,
              '.mobile-tab-icon svg': 1,
              '.weather-hero': 1,
              '.home-story--forecast': 1,
              '.home-map-story': 1,
              '.editorial-footer': 1,
          }
          missing = [selector for selector, minimum in required.items() if combined.count(selector) < minimum]
          print({selector: combined.count(selector) for selector in required})
          if missing:
              raise SystemExit('Regras ausentes no CSS final: ' + ', '.join(missing))
          PY

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Publicar bundle direto validado
        run: |
          git fetch origin main --depth=1
          git show origin/main:.github/workflows/quality.yml > .github/workflows/quality.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[direct-production-css] importa CSS consolidado diretamente"
          git push origin HEAD:agent/direct-production-css-bundle
