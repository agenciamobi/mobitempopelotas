name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-branch:
    name: Formatar branch de contratos
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/agent/contract-tests-and-cutover-quality' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do branch
        uses: actions/checkout@v4
        with:
          ref: agent/contract-tests-and-cutover-quality
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Aplicar Prettier no escopo
        run: >-
          npx prettier --write
          package.json
          .github/workflows/quality.yml
          src/lib/push/push-http.server.ts
          src/lib/push/web-push.server.ts
          tests/public-routes.test.ts
          tests/push-http.test.ts
          tests/water-level-state.test.ts

      - name: Registrar formatação
        run: |
          if git diff --quiet; then
            echo "O escopo já está formatado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            package.json \
            .github/workflows/quality.yml \
            src/lib/push/push-http.server.ts \
            src/lib/push/web-push.server.ts \
            tests/public-routes.test.ts \
            tests/push-http.test.ts \
            tests/water-level-state.test.ts
          git commit -m "style: aplicar formatação final aos contratos"
          git push origin HEAD:agent/contract-tests-and-cutover-quality

  validate:
    name: Testes, build, rotas, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Contratos rápidos
        run: npm run test:contracts

      - name: Build de produção
        run: npm run build

      - name: Contrato da árvore de rotas
        env:
          ROUTE_TREE_REQUIRED: "1"
        run: npm run test:routes

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
