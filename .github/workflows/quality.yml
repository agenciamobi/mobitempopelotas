name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Finalizar correções do Codex
        if: github.event_name == 'push' && github.ref == 'refs/heads/agent/web-push-notifications'
        run: |
          node scripts/finalize-push-codex.mjs
          npx prettier --write \
            public/sw.js \
            src/components/pwa/PushNotificationsManager.tsx \
            src/lib/push/*.ts \
            src/lib/supabase/database.types.ts \
            src/routes/api/cron/push-daily.ts \
            src/routes/api/push/*.ts \
            supabase/migrations/20260723113000_create_web_push_subscriptions.sql
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/sw.js src/components/pwa/PushNotificationsManager.tsx src/lib/push src/lib/supabase/database.types.ts src/routes/api/cron/push-daily.ts src/routes/api/push supabase/migrations/20260723113000_create_web_push_subscriptions.sql
          if ! git diff --cached --quiet; then
            git commit -m "fix: aplica recomendações da revisão web push"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Build de produção
        run: npm run build

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
