name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Testes, build, rotas, typecheck e lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Restringir espaçamento aos capítulos editoriais
        if: github.event_name == 'push' && github.ref == 'refs/heads/agent/internal-editorial-shell'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/production/styles/internal-editorial-v27.css")
          content = path.read_text()
          old = '''.site-shell--topic .site-container--topic > [class*="-page"] > section {
            scroll-margin-top: 96px;
            margin-top: 0;
            padding-block: clamp(64px, 7vw, 108px);
          }

          .site-shell--topic .site-container--topic > [class*="-page"] > section + section {
            border-top: 1px solid var(--internal-line);
          }'''
          new = '''.site-shell--topic .site-container--topic > [class*="-page"] > section {
            scroll-margin-top: 96px;
          }

          .site-shell--topic
            .site-container--topic
            > [class*="-page"]
            > section[class*="-section"] {
            margin-top: 0;
            padding-block: clamp(64px, 7vw, 108px);
          }

          .site-shell--topic
            .site-container--topic
            > [class*="-page"]
            > section[class*="-section"]
            + section[class*="-section"] {
            border-top: 1px solid var(--internal-line);
          }'''
          if old not in content:
              raise SystemExit("Bloco editorial esperado não encontrado")
          content = content.replace(old, new, 1)
          content = content.replace(
              '.site-shell--topic .site-container--topic > [class*="-page"] > section {\n    padding-block: 58px;\n  }',
              '.site-shell--topic\n    .site-container--topic\n    > [class*="-page"]\n    > section[class*="-section"] {\n    padding-block: 58px;\n  }',
              1,
          )
          path.write_text(content)
          PY
          npx prettier --write src/production/styles/internal-editorial-v27.css
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/production/styles/internal-editorial-v27.css
          git commit -m "fix: preserva altura dos blocos editoriais compactos"
          git push origin HEAD:agent/internal-editorial-shell

      - name: Validar template de ambiente
        run: npm run runtime:check:example

      - name: Contratos rápidos
        run: npm run test:contracts

      - name: Build de produção
        run: npm run build

      - name: Contrato da árvore de rotas
        env:
          ROUTE_TREE_REQUIRED: "1"
        run: npm run test:routes

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
