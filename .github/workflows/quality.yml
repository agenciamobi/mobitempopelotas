name: Qualidade

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Formatar e validar transplante
    if: ${{ !contains(github.event.head_commit.message, '[format-exact-production]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/format-exact-production

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Aplicar Prettier oficial
        run: |
          npx prettier --write \
            src/production/ProductionHome.tsx \
            src/production/adapters/home.ts \
            src/production/components/weather-hero.tsx

      - name: Build de produção
        run: npm run build

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Publicar formatação validada
        run: |
          git fetch origin main --depth=1
          git show origin/main:.github/workflows/quality.yml > .github/workflows/quality.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[format-exact-production] normaliza transplante literal"
          git push origin HEAD:agent/format-exact-production
