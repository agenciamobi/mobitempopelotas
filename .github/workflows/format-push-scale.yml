name: Formatar escala do push

on:
  push:
    branches:
      - agent/web-push-notifications
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: format-push-scale-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/web-push-notifications
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Formatar arquivos do lote
        run: |
          npx prettier --write \
            src/lib/push/push-storage.server.ts \
            src/lib/push/web-push.server.ts \
            src/routes/api/cron/push-daily.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/push/push-storage.server.ts src/lib/push/web-push.server.ts src/routes/api/cron/push-daily.ts
          if ! git diff --cached --quiet; then
            git commit -m "style: formata paginação e lease do web push"
            git push origin HEAD:agent/web-push-notifications
          fi
