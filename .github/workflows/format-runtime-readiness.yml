name: Formatar preflight temporariamente

on:
  push:
    branches:
      - agent/runtime-readiness-preflight

permissions:
  contents: write

concurrency:
  group: format-runtime-readiness
  cancel-in-progress: true

jobs:
  format:
    name: Aplicar Prettier travado
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/runtime-readiness-preflight

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Aplicar formatação oficial
        run: >-
          npx prettier --write
          scripts/runtime-readiness.mjs
          docs/RUNTIME_READINESS.md
          .env.example
          package.json
          .github/workflows/quality.yml

      - name: Publicar correção quando necessária
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Nenhuma alteração de formatação necessária."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/runtime-readiness.mjs docs/RUNTIME_READINESS.md .env.example package.json .github/workflows/quality.yml
          git commit -m "style: aplica formatação oficial ao preflight"
          git push origin HEAD:agent/runtime-readiness-preflight
