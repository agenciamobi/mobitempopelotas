name: Formatar auditoria do rodapé

on:
  push:
    branches:
      - agent/footer-light-runtime-audit

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[footer-audit-format]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/footer-light-runtime-audit

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-audit --no-fund
      - run: npx prettier --write scripts/visual-parity-audit.mjs

      - name: Publicar formatação
        run: |
          rm .github/workflows/format-footer-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/visual-parity-audit.mjs .github/workflows/format-footer-audit.yml
          git commit -m "[footer-audit-format] normaliza asserção do rodapé"
          git push origin HEAD:agent/footer-light-runtime-audit
