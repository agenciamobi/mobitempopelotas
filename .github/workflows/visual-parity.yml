name: Validação visual da pilha CSS

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - scripts/verify-production-css-live.mjs
      - .github/workflows/visual-parity.yml

permissions:
  contents: read

concurrency:
  group: verify-production-css-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Validar Vercel e Lovable
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar Playwright
        run: |
          npm install --no-save --package-lock=false playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Validar pilha CSS publicada
        env:
          PRODUCTION_URL: https://www.tempopelotas.com.br
          LOVABLE_URL: https://mobitempopelotas.lovable.app
        run: node scripts/verify-production-css-live.mjs

      - name: Publicar relatório e capturas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-production-css-live-${{ github.run_number }}
          path: artifacts/verify-production-css-live
          if-no-files-found: error
          retention-days: 14
