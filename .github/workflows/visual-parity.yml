# Capturas e verificações estruturais da homepage copiada da produção Vercel.
# Execução temporária para comparar o transplante publicado nos mesmos viewports.
name: Auditoria visual do transplante literal

on:
  workflow_dispatch:
  push:
    branches:
      - agent/visual-exact-production
    paths:
      - scripts/visual-exact-production-audit.mjs
      - .github/workflows/visual-parity.yml
  pull_request:
    branches:
      - main
    paths:
      - src/production/**
      - src/routes/index.tsx
      - src/components/layout/SiteLayout.tsx
      - scripts/visual-exact-production-audit.mjs
      - .github/workflows/visual-parity.yml

permissions:
  contents: read

concurrency:
  group: visual-exact-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Comparar Vercel e Lovable
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar Playwright para auditoria
        run: |
          npm install --no-save --package-lock=false playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Capturar e validar viewports
        env:
          PRODUCTION_URL: https://www.tempopelotas.com.br
          LOVABLE_URL: https://mobitempopelotas.lovable.app
        run: node scripts/visual-exact-production-audit.mjs

      - name: Publicar relatório e capturas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-exact-production-${{ github.run_number }}
          path: artifacts/visual-exact-production
          if-no-files-found: error
          retention-days: 14
