name: Diagnóstico de formatação

on:
  push:
    branches:
      - agent/redemet-home-methodology-runtime
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Formatar arquivos alterados
        run: |
          npx prettier --write \
            src/components/weather/HomeRegionalObservation.tsx \
            src/components/weather/HomeRegionalObservation.css \
            src/components/weather/WeatherHome.tsx \
            src/routes/index.tsx \
            .github/workflows/runtime-smoke.yml
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-redemet-home
          path: |
            src/components/weather/HomeRegionalObservation.tsx
            src/components/weather/HomeRegionalObservation.css
            src/components/weather/WeatherHome.tsx
            src/routes/index.tsx
            .github/workflows/runtime-smoke.yml
          retention-days: 1
