name: Formatar página da Estação Embrapa

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format-and-validate:
    if: github.head_ref == 'agent/migrate-embrapa-page' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/migrate-embrapa-page
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar lote
        run: |
          npx prettier --write \
            src/components/embrapa/EmbrapaStationPage.tsx \
            src/components/embrapa/EmbrapaStationPage.css \
            src/routes/estacao-embrapa-pelotas.tsx

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Publicar formatação
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/embrapa/EmbrapaStationPage.tsx src/components/embrapa/EmbrapaStationPage.css src/routes/estacao-embrapa-pelotas.tsx
          git commit -m "style: formata página da Estação Embrapa"
          git push origin HEAD:agent/migrate-embrapa-page
