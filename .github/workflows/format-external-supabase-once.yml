name: Formatar integração Supabase externo

on:
  push:
    branches:
      - agent/external-supabase-lovable
    paths:
      - .github/workflows/format-external-supabase-once.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/external-supabase-lovable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Aplicar Prettier
        run: >-
          npx prettier --write
          scripts/runtime-readiness-lovable.mjs
          tests/lovable-runtime-readiness.test.ts
          src/lib/supabase/server-client.server.ts
          package.json
      - name: Commitar formatação
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/runtime-readiness-lovable.mjs tests/lovable-runtime-readiness.test.ts src/lib/supabase/server-client.server.ts package.json
          git commit -m "style: formata integração Supabase externo"
          git push origin HEAD:agent/external-supabase-lovable
