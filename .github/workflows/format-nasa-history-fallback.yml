name: Formatar fallback NASA do histórico

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format-and-validate:
    if: github.head_ref == 'agent/nasa-power-history-fallback' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/nasa-power-history-fallback
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivo
        run: npx prettier --write src/lib/weather/history.server.ts

      - name: Validar NASA POWER
        shell: bash
        run: |
          set -euo pipefail
          END_DATE="$(TZ=America/Sao_Paulo date -d 'yesterday' +%Y%m%d)"
          START_DATE="$(TZ=America/Sao_Paulo date -d 'yesterday -89 days' +%Y%m%d)"
          URL="https://power.larc.nasa.gov/api/temporal/daily/point?parameters=T2M_MAX%2CT2M_MIN%2CPRECTOTCORR&community=AG&longitude=-52.3376&latitude=-31.7654&start=$START_DATE&end=$END_DATE&format=JSON&time-standard=UTC"
          STATUS="$(curl --silent --show-error --max-time 60 \
            --user-agent 'MOBI-Tempo-Pelotas/1.0 (+https://agenciamobi.com.br)' \
            --output nasa-power.json \
            --write-out '%{http_code}' \
            "$URL")"
          test "$STATUS" = "200"
          jq -e '.properties.parameter.T2M_MAX | type == "object"' nasa-power.json >/dev/null
          jq -e '.properties.parameter.T2M_MIN | type == "object"' nasa-power.json >/dev/null
          jq -e '.properties.parameter.PRECTOTCORR | type == "object"' nasa-power.json >/dev/null
          VALID_DAYS="$(jq '[.properties.parameter.T2M_MAX[] | select(. != -999)] | length' nasa-power.json)"
          test "$VALID_DAYS" -ge 30
          echo "NASA POWER: $VALID_DAYS dias válidos"
          rm nasa-power.json

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Publicar formatação
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/weather/history.server.ts
          git commit -m "style: formata fallback NASA do histórico"
          git push origin HEAD:agent/nasa-power-history-fallback
