name: Validar dados públicos e feed

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'agent/public-data-feed' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/public-data-feed
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Atualizar matriz de migração
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("MIGRATION_MATRIX.md")
          text = path.read_text(encoding="utf-8")
          old = "| 45 | `pelotas.json`, feed e transparência | Não migrado | `/pelotas.json`, `/feed`, metodologia | rotas públicas Nitro | contratos agregados | Definir cache, content-type e versão do schema | Médio | JSON estável, feed válido e documentação das fontes | 9 |"
          new = "| 45 | `pelotas.json`, feed e transparência | Migrado | `/pelotas.json`, `/feed`, metodologia | `src/routes/pelotas[.]json.ts`, `src/routes/feed.ts`, `src/lib/public-portal.server.ts` | contratos meteorológico e hidrológico atuais | Schema 2.0, JSON Feed 1.1, CORS e cache explícitos | Baixo | JSON estável, feed válido e documentação das fontes | 9 |"
          if text.count(old) != 1:
              raise SystemExit("Linha 45 da matriz não encontrada de forma única")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivos
        run: |
          npx prettier --write \
            src/lib/public-portal.server.ts \
            src/routes/feed.ts \
            src/routes/__root.tsx
          file="src/routes/pelotas[.]json.ts"
          npx prettier --stdin-filepath "$file" < "$file" > "$file.formatted"
          mv "$file.formatted" "$file"

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Iniciar runtime SSR
        run: |
          npm run dev -- --host 127.0.0.1 --port 3000 > /tmp/tempo-pelotas-public-data.log 2>&1 &
          echo $! > /tmp/tempo-pelotas-public-data.pid

      - name: Aguardar runtime
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ > /tmp/home.html; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/tempo-pelotas-public-data.log
          exit 1

      - name: Validar descoberta do feed
        run: |
          grep -q 'rel="alternate"' /tmp/home.html
          grep -q 'type="application/feed+json"' /tmp/home.html
          grep -q 'href="https://mobitempopelotas.lovable.app/feed"' /tmp/home.html

      - name: Baixar pelotas.json
        run: |
          curl --fail --silent --show-error --max-time 60 \
            --dump-header /tmp/pelotas.headers \
            http://127.0.0.1:3000/pelotas.json > /tmp/pelotas.json
          test -s /tmp/pelotas.json
          jq -e . /tmp/pelotas.json >/dev/null

      - name: Validar headers do pelotas.json
        run: |
          cat /tmp/pelotas.headers
          grep -qi '^content-type: application/json' /tmp/pelotas.headers
          grep -qi '^access-control-allow-origin: \*$' /tmp/pelotas.headers

      - name: Validar contrato base do pelotas.json
        run: |
          jq -e '.schema_version == "2.0"' /tmp/pelotas.json >/dev/null
          jq -e '.location.city == "Pelotas"' /tmp/pelotas.json >/dev/null
          jq -e '.location.timezone == "America/Sao_Paulo"' /tmp/pelotas.json >/dev/null
          jq -e '.weather | has("current") and has("daily") and has("quality")' /tmp/pelotas.json >/dev/null
          jq -e '.hydrology.local_level | has("laranjal")' /tmp/pelotas.json >/dev/null

      - name: Validar segurança e links do pelotas.json
        run: |
          jq -e '.weather.observed.embrapa | has("error") | not' /tmp/pelotas.json >/dev/null
          jq -e '.hydrology.local_level.laranjal | has("error") | not' /tmp/pelotas.json >/dev/null
          jq -e '.links.feed == "https://mobitempopelotas.lovable.app/feed"' /tmp/pelotas.json >/dev/null
          jq -e '.links.public_data == "https://mobitempopelotas.lovable.app/pelotas.json"' /tmp/pelotas.json >/dev/null

      - name: Baixar JSON Feed
        run: |
          curl --fail --silent --show-error --max-time 60 \
            --dump-header /tmp/feed.headers \
            http://127.0.0.1:3000/feed > /tmp/feed.json
          test -s /tmp/feed.json
          jq -e . /tmp/feed.json >/dev/null

      - name: Validar headers do JSON Feed
        run: |
          cat /tmp/feed.headers
          grep -qi '^content-type: application/feed+json' /tmp/feed.headers
          grep -qi '^access-control-allow-origin: \*$' /tmp/feed.headers

      - name: Validar contrato do JSON Feed
        run: |
          jq -e '.version == "https://jsonfeed.org/version/1.1"' /tmp/feed.json >/dev/null
          jq -e '.title == "Tempo Pelotas"' /tmp/feed.json >/dev/null
          jq -e '.feed_url == "https://mobitempopelotas.lovable.app/feed"' /tmp/feed.json >/dev/null
          jq -e '(.items | length) == 5' /tmp/feed.json >/dev/null
          jq -e '([.items[].id] | unique | length) == 5' /tmp/feed.json >/dev/null
          jq -e '([.items[] | has("content_text")] | all)' /tmp/feed.json >/dev/null

      - name: Publicar formatação e route tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MIGRATION_MATRIX.md src
          git commit -m "feat: publica dados estruturados e feed JSON"
          git push origin HEAD:agent/public-data-feed

      - name: Publicar artefatos de diagnóstico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-data-feed-diagnostics
          path: |
            /tmp/home.html
            /tmp/pelotas.headers
            /tmp/pelotas.json
            /tmp/feed.headers
            /tmp/feed.json
            /tmp/tempo-pelotas-public-data.log
          if-no-files-found: warn
          retention-days: 3
