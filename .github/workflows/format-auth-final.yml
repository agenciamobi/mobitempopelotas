name: Formatar ajustes finais da autenticação

on:
  push:
    branches:
      - agent/auth-account-lgpd
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: format-auth-final-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Aplicar Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Formatar arquivos finais
        run: |
          npx prettier --write \
            src/production/components/site-footer.tsx \
            scripts/auth-visual-smoke.mjs \
            .github/workflows/visual-parity.yml

      - name: Versionar formatação
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/production/components/site-footer.tsx scripts/auth-visual-smoke.mjs .github/workflows/visual-parity.yml
          if git diff --cached --quiet; then
            echo "Arquivos já estão formatados."
          else
            git commit -m "style: formata ajustes finais da autenticação"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
