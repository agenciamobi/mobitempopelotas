name: Formatar fallback histórico

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format-and-validate:
    if: github.head_ref == 'agent/fallback-weather-history-archive' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: agent/fallback-weather-history-archive
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Formatar arquivo
        run: npx prettier --write src/lib/weather/history.server.ts

      - name: Validar fontes históricas
        shell: bash
        run: |
          set -euo pipefail
          END_DATE="$(TZ=America/Sao_Paulo date -d 'yesterday' +%F)"
          START_DATE="$(TZ=America/Sao_Paulo date -d "$END_DATE -29 days" +%F)"
          QUERY="latitude=-31.7654&longitude=-52.3376&timezone=America%2FSao_Paulo&start_date=$START_DATE&end_date=$END_DATE&daily=temperature_2m_max%2Ctemperature_2m_min%2Cprecipitation_sum%2Cwind_gusts_10m_max"

          for entry in \
            "primary|https://historical-forecast-api.open-meteo.com/v1/forecast?$QUERY" \
            "archive|https://archive-api.open-meteo.com/v1/archive?$QUERY"; do
            name="${entry%%|*}"
            url="${entry#*|}"
            status="$(curl --silent --show-error --max-time 25 \
              --user-agent 'MOBI-Tempo-Pelotas/1.0 (+https://agenciamobi.com.br)' \
              --output "$name.json" \
              --write-out '%{http_code}' \
              "$url")"
            test "$status" = "200"
            jq -e '(.daily.time | length) == 30' "$name.json" >/dev/null
            jq -e '(.daily.temperature_2m_max | length) == (.daily.time | length)' "$name.json" >/dev/null
            jq -e '(.daily.temperature_2m_min | length) == (.daily.time | length)' "$name.json" >/dev/null
            jq -e '(.daily.precipitation_sum | length) == (.daily.time | length)' "$name.json" >/dev/null
            jq -e '(.daily.wind_gusts_10m_max | length) == (.daily.time | length)' "$name.json" >/dev/null
            rm "$name.json"
          done

      - name: Validar build
        run: npm run build

      - name: Validar tipos
        run: npm run typecheck

      - name: Validar lint
        run: npm run lint

      - name: Publicar formatação
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/weather/history.server.ts
          git commit -m "style: formata fallback histórico"
          git push origin HEAD:agent/fallback-weather-history-archive
