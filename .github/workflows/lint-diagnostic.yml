name: Diagnóstico temporário do lint

on:
  push:
    branches:
      - agent/fix-open-meteo-runtime

permissions:
  contents: read

jobs:
  lint-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Capturar lint
        run: npm run lint > lint.log 2>&1 || true

      - name: Publicar relatório
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint.log
          if-no-files-found: error
          retention-days: 1
