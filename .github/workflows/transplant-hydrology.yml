name: Transplantar hidrologia regional

on:
  push:
    branches:
      - agent/hydrology-regional-network-v2

permissions:
  contents: write

jobs:
  transplant:
    if: ${{ !contains(github.event.head_commit.message, '[hydrology-v2]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/hydrology-regional-network-v2
          fetch-depth: 0

      - name: Buscar branch de origem
        run: git fetch origin agent/hydrology-regional-network:refs/remotes/origin/agent/hydrology-regional-network

      - name: Transplantar somente arquivos do lote D
        run: |
          files=(
            src/components/hydrology/HydrologyPages.tsx
            src/components/hydrology/RegionalWaterNetwork.css
            src/components/hydrology/RegionalWaterNetwork.tsx
            src/components/weather/WeatherHome.tsx
            src/lib/hydrology/guaiba.functions.ts
            src/lib/hydrology/guaiba.server.ts
            src/lib/hydrology/lagoon-network.functions.ts
            src/lib/hydrology/lagoon-network.server.ts
            src/routes/index.tsx
            src/routes/situacao-hidrologica-pelotas.tsx
          )

          for file in "${files[@]}"; do
            mkdir -p "$(dirname "$file")"
            git show "origin/agent/hydrology-regional-network:$file" > "$file"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Formatar lote
        run: |
          npx prettier --write \
            src/components/hydrology/HydrologyPages.tsx \
            src/components/hydrology/RegionalWaterNetwork.css \
            src/components/hydrology/RegionalWaterNetwork.tsx \
            src/components/weather/WeatherHome.tsx \
            src/lib/hydrology/guaiba.functions.ts \
            src/lib/hydrology/guaiba.server.ts \
            src/lib/hydrology/lagoon-network.functions.ts \
            src/lib/hydrology/lagoon-network.server.ts \
            src/routes/index.tsx \
            src/routes/situacao-hidrologica-pelotas.tsx

      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint

      - name: Confirmar que routeTree da main foi preservado
        run: git diff --exit-code HEAD -- src/routeTree.gen.ts

      - name: Publicar branch validada
        run: |
          rm .github/workflows/transplant-hydrology.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[hydrology-v2] integra rede regional sobre a main atual"
          git push origin HEAD:agent/hydrology-regional-network-v2
