          (adapters / 'home.ts').write_text('''import type { GuaibaObservationData } from "@/lib/hydrology/guaiba.server";
import type { LagoonMonitoringNetworkData } from "@/lib/hydrology/lagoon-network.server";
import type { LaranjalLevelData } from "@/lib/hydrology/laranjal-level.server";
import type { AggregatedWeatherData } from "@/lib/weather/aggregated-weather.types";
import type { WeatherIntelligenceData } from "@/lib/weather/weather-intelligence.types";
import type { EmbrapaObservationData } from "@/production/lib/embrapa-observation";
import type { InmetAlertsData } from "@/production/lib/inmet-alerts";
import type { WeatherAiSummaries } from "@/production/lib/weather-ai-summary";
import type { WeatherData } from "@/production/lib/weather-data";

function finite(value: number | null | undefined, fallback = 0) {
  return typeof value === "number" && Number.isFinite(value) ? value : fallback;
}

function formatUpdatedAt(value: string | null | undefined) {
  if (!value) return "Horário não informado";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return new Intl.DateTimeFormat("pt-BR", {
    timeZone: "America/Sao_Paulo",
    day: "2-digit",
    month: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
  }).format(date);
}

export function toProductionWeatherData(data: AggregatedWeatherData): WeatherData {
  const current = data.current;
  const today = data.daily[0];
  const temperature = finite(current?.temperature, finite(today?.max));
  const observedAt = current?.observedAt ?? data.source.fetchedAt;

  return {
    current: {
      city: current?.city ?? "Pelotas",
      state: current?.state ?? "RS",
      temperature,
      feelsLike: finite(current?.feelsLike, temperature),
      condition: current?.condition ?? data.message ?? "Condições em atualização",
      humidity: finite(current?.humidity),
      pressure: finite(current?.pressure),
      windSpeed: finite(current?.windSpeed),
      windGust: finite(current?.windGust, finite(current?.windSpeed)),
      windDirection: current?.windDirection ?? "Indisponível",
      visibility: finite(current?.visibilityKm),
      sunrise: current?.sunrise ?? "—",
      sunset: current?.sunset ?? "—",
      updatedAt: formatUpdatedAt(observedAt),
      icon: current?.icon ?? today?.icon ?? "cloud",
      source: {
        name: data.quality.currentSource === "embrapa" ? "Embrapa Clima Temperado" : data.quality.forecastProvider ?? "MOBI Tempo Pelotas",
        url: data.quality.currentSource === "embrapa" ? data.observation.source.url : "/metodologia",
        kind: data.quality.currentSource === "embrapa" ? "observation" : "forecast",
        observedAt: data.observation.source.observationTime ?? observedAt,
      },
    },
    hourly: data.hourly.map((hour) => ({
      time: hour.time,
      temperature: hour.temperature,
      precipitation: hour.precipitationProbability ?? 0,
      windSpeed: hour.windSpeed,
      windGust: hour.windGust ?? hour.windSpeed,
      icon: hour.icon,
    })),
    daily: data.daily.map((day) => ({
      weekday: day.weekday,
      date: day.date,
      min: day.min,
      max: day.max,
      rainChance: day.rainChance ?? 0,
      precipitation: day.precipitationMm,
      windGust: day.windGust ?? 0,
      icon: day.icon,
    })),
    regional: current
      ? [
          {
            city: "Pelotas",
            temperature,
            condition: current.icon ?? "cloud",
            latitude: -31.7654,
            longitude: -52.3376,
          },
        ]
      : [],
    source: {
      name: "MOBI Tempo Pelotas",
      url: "/metodologia",
      isFallback: data.status !== "live",
      observationName: data.observation.source.name,
      observationUrl: data.observation.source.url,
      forecastName: data.quality.forecastProvider ?? "Modelo meteorológico",
      forecastUrl: "/metodologia",
    },
  };
}

export function toProductionObservation(data: AggregatedWeatherData): EmbrapaObservationData {
  const observation = data.observation;
  const empty = { value: null, time: null };
  return {
    ...observation,
    extremes: {
      ...observation.extremes,
      dewPointMin: empty,
      dewPointMax: empty,
    },
    accumulated: {
      ...observation.accumulated,
      evapotranspirationDaily: null,
      evapotranspirationMonthly: null,
      evapotranspirationAnnual: null,
    },
  };
}

export function toProductionAlerts(data: AggregatedWeatherData): InmetAlertsData {
  const alerts = data.alerts;
  return {
    status: data.sources.inmet.usable ? "live" : "unavailable",
    alerts,
    counts: {
      total: alerts.length,
      pelotas: alerts.filter((alert) => alert.relevance === "pelotas").length,
      regional: alerts.filter((alert) => alert.relevance === "regional").length,
      state: alerts.filter((alert) => alert.relevance === "state").length,
    },
    source: {
      name: "INMET",
      feedUrl: "https://apiprevmet3.inmet.gov.br/avisos/ativos",
      portalUrl: "https://alertas2.inmet.gov.br/",
      fetchedAt: data.sources.inmet.fetchedAt,
    },
    error: data.sources.inmet.reason,
  };
}

export function toProductionSummaries(data: WeatherIntelligenceData): WeatherAiSummaries {
  return {
    status: data.intelligence.origin === "gemini" ? "generated" : "unavailable",
    today: { headline: data.brief.headline, summary: data.brief.summary },
    tomorrow: null,
    generatedAt: data.intelligence.generatedAt,
    model: data.intelligence.model,
  };
}

export type ProductionHomeHydrology = {
  laranjal: LaranjalLevelData;
  guaiba: GuaibaObservationData;
  lagoon: LagoonMonitoringNetworkData;
};
''')

          (production / 'ProductionHome.tsx').write_text('''import type { GuaibaObservationData } from "@/lib/hydrology/guaiba.server";
import type { LagoonMonitoringNetworkData } from "@/lib/hydrology/lagoon-network.server";
import type { LaranjalLevelData } from "@/lib/hydrology/laranjal-level.server";
import type { WeatherIntelligenceData } from "@/lib/weather/weather-intelligence.types";
import {
  toProductionAlerts,
  toProductionObservation,
  toProductionSummaries,
  toProductionWeatherData,
} from "@/production/adapters/home";
import { HomeEditorialDashboard } from "@/production/components/home-editorial-dashboard-semantic";
import { HomeSectionNavigation } from "@/production/components/home-section-navigation";
import { InmetAlertsPanel } from "@/production/components/inmet-alerts-panel";
import { SafetyAlertBanner } from "@/production/components/safety-alerts";
import { SiteFooter } from "@/production/components/site-footer";
import { SiteHeader } from "@/production/components/site-header";
import { WeatherHero } from "@/production/components/weather-hero";
import { getFeaturedSafetyBanner } from "@/production/lib/safety-banners";
import { getWeatherAdvisory, type AdvisoryLevel } from "@/production/lib/weather-insights";
import "maplibre-gl/dist/maplibre-gl.css";
import "./production.css";

const advisoryRank: Record<AdvisoryLevel, number> = { normal: 0, attention: 1, warning: 2 };

export function ProductionHome({
  data,
  laranjal,
  guaiba,
  lagoon,
}: {
  data: WeatherIntelligenceData;
  laranjal: LaranjalLevelData;
  guaiba: GuaibaObservationData;
  lagoon: LagoonMonitoringNetworkData;
}) {
  const weather = toProductionWeatherData(data.weather);
  const summaries = toProductionSummaries(data);
  const observation = toProductionObservation(data.weather);
  const inmetAlerts = toProductionAlerts(data.weather);
  const advisory = getWeatherAdvisory(weather);
  const pelotasOfficialAlerts = inmetAlerts.alerts.filter((alert) => alert.relevance === "pelotas");
  const officialLevel: AdvisoryLevel = pelotasOfficialAlerts.some(
    (alert) => alert.severity === "danger" || alert.severity === "great-danger",
  )
    ? "warning"
    : pelotasOfficialAlerts.some((alert) => alert.severity === "potential")
      ? "attention"
      : "normal";
  const headerLevel =
    advisoryRank[officialLevel] > advisoryRank[advisory.level] ? officialLevel : advisory.level;
  const featuredSafetyBanner = getFeaturedSafetyBanner(pelotasOfficialAlerts.length > 0);
  const cppmetToday = data.weather.officialForecast[0] ?? null;
  const mainClassName =
    pelotasOfficialAlerts.length > 0
      ? "home-editorial-main has-official-alerts"
      : "home-editorial-main";

  return (
    <div className="site-shell site-shell--home site-shell--home-editorial">
      <SiteHeader advisoryLevel={headerLevel} variant="hero" />
      <WeatherHero
        weather={weather}
        advisoryLevel={headerLevel}
        officialAlertCount={pelotasOfficialAlerts.length}
        cppmetForecast={
          cppmetToday
            ? { item: cppmetToday, sourceUrl: "https://wp.ufpel.edu.br/cppmet/" }
            : null
        }
      />

      <main className={mainClassName} id="conteudo-principal" tabIndex={-1}>
        <InmetAlertsPanel data={inmetAlerts} variant="home" />
        <SafetyAlertBanner banner={featuredSafetyBanner} />
        <HomeSectionNavigation />
        <HomeEditorialDashboard
          weather={weather}
          summaries={summaries}
          advisoryLevel={headerLevel}
          observation={observation}
          laranjal={laranjal}
          guaiba={guaiba}
          lagoon={lagoon}
        />
      </main>

      <SiteFooter source={weather.source} />
    </div>
  );
}
''')

          route_path = root / 'src' / 'routes' / 'index.tsx'
          route_path.write_text('''import { createFileRoute } from "@tanstack/react-router";

import { ProductionHome } from "@/production/ProductionHome";
import { getGuaibaObservation } from "@/lib/hydrology/guaiba.functions";
import { getLagoonMonitoringNetwork } from "@/lib/hydrology/lagoon-network.functions";
import { getLaranjalLevelData } from "@/lib/hydrology/laranjal-level.functions";
import { createPageHead } from "@/lib/page-meta";
import { getWeatherIntelligence } from "@/lib/weather/weather-intelligence.functions";

export const Route = createFileRoute("/")({
  head: () =>
    createPageHead(
      "Tempo Pelotas — Previsão do tempo em Pelotas",
      "Condições atuais, alertas oficiais e previsão meteorológica consolidada para Pelotas, Rio Grande do Sul.",
      "/",
    ),
  loader: async () => {
    const [weather, laranjal, guaiba, lagoon] = await Promise.all([
      getWeatherIntelligence(),
      getLaranjalLevelData(),
      getGuaibaObservation(),
      getLagoonMonitoringNetwork(),
    ]);

    return { weather, laranjal, guaiba, lagoon };
  },
  staleTime: 60 * 1_000,
  component: HomePage,
});

function HomePage() {
  const { weather, laranjal, guaiba, lagoon } = Route.useLoaderData();
  return <ProductionHome data={weather} laranjal={laranjal} guaiba={guaiba} lagoon={lagoon} />;
}
''')

