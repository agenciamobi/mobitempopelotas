name: Transplante literal da produção

on:
  push:
    branches:
      - agent/exact-production-port

permissions:
  contents: write

jobs:
  port:
    if: ${{ !contains(github.event.head_commit.message, '[exact-production-port]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/exact-production-port

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Copiar componentes e estilos da produção
        run: |
          python <<'PY'
          from pathlib import Path

          root = Path('.')
          production = root / 'src' / 'production'
          components = production / 'components'
          lib = production / 'lib'
          compat = production / 'compat'
          adapters = production / 'adapters'
          for directory in (components, lib, compat, adapters):
              directory.mkdir(parents=True, exist_ok=True)

          component_files = [
              'site-header.tsx',
              'weather-hero.tsx',
              'weather-icon.tsx',
              'home-section-navigation.tsx',
              'inmet-alerts-panel.tsx',
              'safety-alerts.tsx',
              'site-footer.tsx',
              'home-editorial-dashboard.tsx',
              'home-editorial-dashboard-semantic.tsx',
              'weather-map.tsx',
              'weather-map.module.css',
          ]

          replacements = {
              'import Link from "next/link";': 'import Link from "@/production/compat/NextLink";',
              'import { usePathname } from "next/navigation";': 'import { usePathname } from "@/production/compat/navigation";',
              '"@/components/weather-icon"': '"@/production/components/weather-icon"',
              '"@/components/weather-map"': '"@/production/components/weather-map"',
              '"@/components/home-editorial-dashboard"': '"@/production/components/home-editorial-dashboard"',
              '"@/lib/weather-data"': '"@/production/lib/weather-data"',
              '"@/lib/weather-insights"': '"@/production/lib/weather-insights"',
              '"@/lib/cppmet-forecast"': '"@/production/lib/cppmet-forecast"',
              '"@/lib/inmet-alerts"': '"@/production/lib/inmet-alerts"',
              '"@/lib/safety-banners"': '"@/production/lib/safety-banners"',
              '"@/lib/embrapa-observation"': '"@/production/lib/embrapa-observation"',
              '"@/lib/guaiba-monitor"': '"@/production/lib/guaiba-monitor"',
              '"@/lib/lagoon-monitoring-network"': '"@/production/lib/lagoon-monitoring-network"',
              '"@/lib/laranjal-level"': '"@/production/lib/laranjal-level"',
              '"@/lib/weather-ai-summary"': '"@/production/lib/weather-ai-summary"',
              '"@/lib/water-level-state"': '"@/production/lib/water-level-state"',
              '"@/lib/redemet-types"': '"@/production/lib/redemet-types"',
          }

          for filename in component_files:
              source = root / '_legacy' / 'components' / filename
              target = components / filename
              text = source.read_text()
              for old, new in replacements.items():
                  text = text.replace(old, new)
              target.write_text(text)

          for filename in ['weather-data.ts', 'weather-insights.ts', 'water-level-state.ts', 'redemet-types.ts', 'safety-banners.ts']:
              source = root / '_legacy' / 'lib' / filename
              target = lib / filename
              text = source.read_text().replace('"@/lib/weather-data"', '"@/production/lib/weather-data"')
              target.write_text(text)

          legacy_css = (root / '_legacy' / 'app' / 'globals.css').read_text()
          legacy_css = legacy_css.replace('@import "tailwindcss";\n\n', '', 1)
          (production / 'production.css').write_text(legacy_css)

          (compat / 'NextLink.tsx').write_text('''import type { AnchorHTMLAttributes, ReactNode } from "react";

type LegacyHref = string | { pathname?: string; query?: Record<string, unknown>; hash?: string };

type LegacyLinkProps = Omit<AnchorHTMLAttributes<HTMLAnchorElement>, "href"> & {
  href: LegacyHref;
  children?: ReactNode;
  prefetch?: boolean;
  replace?: boolean;
  scroll?: boolean;
};

function resolveHref(href: LegacyHref) {
  if (typeof href === "string") return href;
  const pathname = href.pathname ?? "/";
  const search = href.query ? `?${new URLSearchParams(Object.entries(href.query).map(([key, value]) => [key, String(value)])).toString()}` : "";
  const hash = href.hash ? `#${href.hash.replace(/^#/, "")}` : "";
  return `${pathname}${search}${hash}`;
}

export default function NextLink({ href, prefetch: _prefetch, replace: _replace, scroll: _scroll, ...props }: LegacyLinkProps) {
  return <a href={resolveHref(href)} {...props} />;
}
''')

