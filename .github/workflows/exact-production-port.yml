        run: npm install maplibre-gl@5.24.0 --save --no-audit --no-fund

      - name: Formatar e validar
        run: |
          npx prettier --write src/production src/routes/index.tsx src/components/layout/SiteLayout.tsx package.json package-lock.json
          npm run build
          npm run typecheck
          npm run lint

      - name: Commitar transplante validado
