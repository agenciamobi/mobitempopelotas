name: Smoke de produção após secret

on:
  push:
    branches:
      - agent/production-smoke-after-secret
    paths:
      - .github/workflows/production-smoke-after-secret.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/production-smoke-after-secret.yml

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Executar smoke test de cutover
        env:
          BASE_URL: https://tempopelotas.com.br
        run: npm run cutover:smoke

      - name: Verificar build público e configuração de push
        run: |
          node <<'NODE'
          import { writeFile, mkdir } from 'node:fs/promises';

          const targets = {
            production: 'https://tempopelotas.com.br',
            lovable: 'https://mobitempopelotas.lovable.app',
          };
          const expectedProject = 'ovcpgjyomwjteapbvfwk.supabase.co';
          const report = { generatedAt: new Date().toISOString(), targets: {}, push: null, bundle: null };

          async function fetchChecked(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: {
                'User-Agent': 'TempoPelotas-Production-Smoke/1.0',
                ...(options.headers ?? {}),
              },
              signal: AbortSignal.timeout(30000),
            });
            return response;
          }

          for (const [name, base] of Object.entries(targets)) {
            const response = await fetchChecked(`${base}/`);
            const html = await response.text();
            if (response.status !== 200) throw new Error(`${name}: HTTP ${response.status}`);
            if (!html.includes('<title>')) throw new Error(`${name}: título ausente`);
            report.targets[name] = {
              status: response.status,
              finalUrl: response.url,
              contentType: response.headers.get('content-type'),
              bytes: Buffer.byteLength(html),
            };
          }

          const login = await fetchChecked(`${targets.production}/entrar`);
          const loginHtml = await login.text();
          if (login.status !== 200) throw new Error(`/entrar: HTTP ${login.status}`);
          if (!loginHtml.includes('Entrar')) throw new Error('/entrar: conteúdo esperado ausente');

          const pushResponse = await fetchChecked(`${targets.production}/api/push/config`, {
            headers: { Accept: 'application/json' },
          });
          const pushRaw = await pushResponse.text();
          if (pushResponse.status !== 200) throw new Error(`/api/push/config: HTTP ${pushResponse.status}`);
          const push = JSON.parse(pushRaw);
          if (typeof push.enabled !== 'boolean') throw new Error('/api/push/config: enabled inválido');
          if (pushRaw.includes('PRIVATE') || pushRaw.includes('SECRET')) {
            throw new Error('/api/push/config: marcador sensível exposto');
          }
          report.push = { enabled: push.enabled, hasPublicKey: Boolean(push.publicKey) };

          const root = await fetchChecked(`${targets.production}/`);
          const rootHtml = await root.text();
          const scriptSources = [...rootHtml.matchAll(/<script[^>]+src=["']([^"']+)["']/gi)].map((match) => match[1]);
          let externalProjectFound = false;
          let sensitiveMarkerFound = false;
          const inspectedScripts = [];

          for (const source of scriptSources) {
            const scriptUrl = new URL(source, targets.production).href;
            const scriptResponse = await fetchChecked(scriptUrl);
            if (!scriptResponse.ok) continue;
            const body = await scriptResponse.text();
            inspectedScripts.push(scriptUrl);
            if (body.includes(expectedProject)) externalProjectFound = true;
            if (body.includes('MOBI_SUPABASE_SECRET_KEY') || body.includes('sb_secret_')) {
              sensitiveMarkerFound = true;
            }
          }

          if (!externalProjectFound) throw new Error('Bundle não contém o projeto Supabase externo esperado');
          if (sensitiveMarkerFound) throw new Error('Bundle expõe marcador de secret administrativa');
          report.bundle = {
            externalProjectFound,
            sensitiveMarkerFound,
            inspectedScripts: inspectedScripts.length,
          };

          await mkdir('artifacts/production-smoke', { recursive: true });
          await writeFile(
            'artifacts/production-smoke/report.json',
            `${JSON.stringify(report, null, 2)}\n`,
          );
          console.log(JSON.stringify(report, null, 2));
          NODE

      - name: Publicar relatórios
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-after-secret
          path: |
            artifacts/cutover-smoke/report.json
            artifacts/production-smoke/report.json
          if-no-files-found: warn
          retention-days: 7
