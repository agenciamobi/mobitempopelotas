name: Smoke de produção após secret

on:
  push:
    branches:
      - agent/production-smoke-after-secret
    paths:
      - .github/workflows/production-smoke-after-secret.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/production-smoke-after-secret.yml

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Executar smoke test de cutover
        env:
          BASE_URL: https://tempopelotas.com.br
        run: npm run cutover:smoke

      - name: Verificar Supabase externo e configuração administrativa
        run: |
          node <<'NODE'
          import { writeFile, mkdir } from 'node:fs/promises';

          const targets = {
            production: 'https://tempopelotas.com.br',
            lovable: 'https://mobitempopelotas.lovable.app',
          };
          const expectedProject = 'ovcpgjyomwjteapbvfwk.supabase.co';
          const secretValuePattern = /sb_secret_[A-Za-z0-9_-]{10,}/;
          const report = {
            generatedAt: new Date().toISOString(),
            targets: {},
            login: null,
            push: null,
            adminConfiguration: null,
            bundle: null,
          };

          async function fetchChecked(url, options = {}) {
            return fetch(url, {
              ...options,
              headers: {
                'User-Agent': 'TempoPelotas-Production-Smoke/1.2',
                ...(options.headers ?? {}),
              },
              signal: AbortSignal.timeout(30000),
            });
          }

          const htmlByTarget = {};
          for (const [name, base] of Object.entries(targets)) {
            const response = await fetchChecked(`${base}/`);
            const html = await response.text();
            if (response.status !== 200) throw new Error(`${name}: HTTP ${response.status}`);
            if (!html.includes('<title>')) throw new Error(`${name}: título ausente`);
            htmlByTarget[name] = html;
            report.targets[name] = {
              status: response.status,
              finalUrl: response.url,
              contentType: response.headers.get('content-type'),
              bytes: Buffer.byteLength(html),
            };
          }

          const loginResponse = await fetchChecked(`${targets.production}/entrar`);
          const loginHtml = await loginResponse.text();
          if (loginResponse.status !== 200) throw new Error(`/entrar: HTTP ${loginResponse.status}`);
          if (!loginHtml.includes('Entrar')) throw new Error('/entrar: conteúdo esperado ausente');
          report.login = {
            status: loginResponse.status,
            finalUrl: loginResponse.url,
            bytes: Buffer.byteLength(loginHtml),
          };

          const pushResponse = await fetchChecked(`${targets.production}/api/push/config`, {
            headers: { Accept: 'application/json' },
          });
          const pushRaw = await pushResponse.text();
          if (pushResponse.status !== 200) throw new Error(`/api/push/config: HTTP ${pushResponse.status}`);
          const push = JSON.parse(pushRaw);
          if (typeof push.enabled !== 'boolean') throw new Error('/api/push/config: enabled inválido');
          if (secretValuePattern.test(pushRaw)) throw new Error('/api/push/config: secret exposta');
          report.push = { enabled: push.enabled, hasPublicKey: Boolean(push.publicKey) };

          const adminResponse = await fetchChecked(`${targets.production}/api/account/delete`, {
            method: 'POST',
            headers: {
              Accept: 'application/json',
              'Content-Type': 'application/json',
              Origin: targets.production,
            },
            body: JSON.stringify({ confirmation: 'EXCLUIR MINHA CONTA' }),
          });
          const adminRaw = await adminResponse.text();
          report.adminConfiguration = {
            status: adminResponse.status,
            response: JSON.parse(adminRaw),
          };
          if (adminResponse.status === 503) {
            throw new Error('MOBI_SUPABASE_SECRET_KEY não foi reconhecida pelo runtime');
          }
          if (adminResponse.status !== 401) {
            throw new Error(`/api/account/delete sem sessão: HTTP ${adminResponse.status}`);
          }

          const documents = [htmlByTarget.production, loginHtml];
          const assetSources = new Set();
          for (const html of documents) {
            for (const match of html.matchAll(/<(?:script|link)\b[^>]*(?:src|href)=["']([^"']+)["'][^>]*>/gi)) {
              if (/\.m?js(?:\?|$)/i.test(match[1])) assetSources.add(match[1]);
            }
          }

          let externalProjectFound = documents.some((html) => html.includes(expectedProject));
          let secretValueFound = documents.some((html) => secretValuePattern.test(html));
          const inspectedAssets = [];

          for (const source of assetSources) {
            const assetUrl = new URL(source, targets.production).href;
            const assetResponse = await fetchChecked(assetUrl);
            if (!assetResponse.ok) continue;
            const body = await assetResponse.text();
            inspectedAssets.push(assetUrl);
            if (body.includes(expectedProject)) externalProjectFound = true;
            if (secretValuePattern.test(body)) secretValueFound = true;
          }

          report.bundle = {
            externalProjectFound,
            secretValueFound,
            discoveredAssets: assetSources.size,
            inspectedAssets: inspectedAssets.length,
          };

          await mkdir('artifacts/production-smoke', { recursive: true });
          await writeFile(
            'artifacts/production-smoke/report.json',
            `${JSON.stringify(report, null, 2)}\n`,
          );
          console.log(JSON.stringify(report, null, 2));

          if (!externalProjectFound) throw new Error('Assets públicos não identificaram o projeto Supabase externo esperado');
          if (secretValueFound) throw new Error('Assets públicos expõem o valor de uma secret administrativa');
          NODE

      - name: Publicar relatórios
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-after-secret
          path: |
            artifacts/cutover-smoke/report.json
            artifacts/production-smoke/report.json
          if-no-files-found: warn
          retention-days: 7
