name: Formatar metodologia

on:
  push:
    branches:
      - agent/redemet-methodology-status

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx prettier --write src/components/methodology/MethodologyPage.tsx src/routes/metodologia.tsx
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-methodology
          path: |
            src/components/methodology/MethodologyPage.tsx
            src/routes/metodologia.tsx
          retention-days: 1
