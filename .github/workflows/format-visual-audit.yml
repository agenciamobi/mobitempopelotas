name: Formatar auditoria visual

on:
  push:
    branches:
      - agent/visual-parity-audit

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[visual-format]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/visual-parity-audit

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-audit --no-fund
      - run: npx prettier --write scripts/visual-parity-audit.mjs

      - name: Publicar formatação
        run: |
          rm .github/workflows/format-visual-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/visual-parity-audit.mjs .github/workflows/format-visual-audit.yml
          git commit -m "[visual-format] aplica Prettier à auditoria visual"
          git push origin HEAD:agent/visual-parity-audit
