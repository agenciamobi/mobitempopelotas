name: Diagnóstico API Laranjal

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose-public-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Executar diagnóstico
        run: bash .github/scripts/diagnose-laranjal-api.sh

      - name: Publicar relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laranjal-public-api-diagnostic
          path: laranjal-diagnostic
          if-no-files-found: error
          retention-days: 2
