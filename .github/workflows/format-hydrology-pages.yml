name: Formatação temporária da hidrologia

on:
  push:
    branches:
      - agent/migrate-hydrology-pages

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/migrate-hydrology-pages

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Aplicar Prettier
        run: npx prettier --write src/lib/hydrology/laranjal-level.server.ts src/lib/hydrology/laranjal-level.functions.ts src/components/hydrology/HydrologyPages.tsx src/components/hydrology/HydrologyPages.css src/routes/situacao-hidrologica-pelotas.tsx src/routes/nivel-da-lagoa-dos-patos-laranjal.tsx

      - name: Registrar formatação
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/hydrology/laranjal-level.server.ts src/lib/hydrology/laranjal-level.functions.ts src/components/hydrology/HydrologyPages.tsx src/components/hydrology/HydrologyPages.css src/routes/situacao-hidrologica-pelotas.tsx src/routes/nivel-da-lagoa-dos-patos-laranjal.tsx
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de formatação."
          else
            git commit -m "style: formata páginas hidrológicas"
            git push origin HEAD:agent/migrate-hydrology-pages
          fi
