name: Formatar integridade meteorológica

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/weather-data-integrity
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Formatar conjunto final
        run: >-
          npx prettier --write
          src/production/lib/weather-data.ts
          src/production/adapters/home.ts
          src/production/ProductionHome.tsx
          src/production/lib/weather-insights.ts
          src/production/components/weather-hero.tsx
          src/production/components/home-editorial-dashboard.tsx
          src/production/components/home-editorial-dashboard-semantic.tsx
          src/components/weather/WeatherEditorialHero.tsx
          src/components/weather/ForecastPages.tsx
          src/components/weather/RainWindPages.tsx
          src/lib/public-portal.server.ts
          src/production/production-styles.ts
          src/production/production-styles.css
          src/production/styles/weather-data-integrity-v28.css
          tests/production-weather-integrity.test.ts
          package.json
      - name: Commitar formatação
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/production/lib/weather-data.ts src/production/adapters/home.ts src/production/ProductionHome.tsx src/production/lib/weather-insights.ts src/production/components/weather-hero.tsx src/production/components/home-editorial-dashboard.tsx src/production/components/home-editorial-dashboard-semantic.tsx src/components/weather/WeatherEditorialHero.tsx src/components/weather/ForecastPages.tsx src/components/weather/RainWindPages.tsx src/lib/public-portal.server.ts src/production/production-styles.ts src/production/production-styles.css src/production/styles/weather-data-integrity-v28.css tests/production-weather-integrity.test.ts package.json
          git commit -m "style: format weather integrity changes"
          git push origin HEAD:agent/weather-data-integrity
