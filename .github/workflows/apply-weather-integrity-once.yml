name: Aplicar integridade meteorológica

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/weather-data-integrity
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Corrigir integridade meteorológica
        run: |
          python scripts/apply-weather-integrity-once.py
          python scripts/apply-weather-integrity-stage2.py
      - name: Formatar arquivos alterados
        run: >-
          npx prettier --write
          src/production/components/home-editorial-dashboard.tsx
          src/components/weather/WeatherEditorialHero.tsx
          src/components/weather/ForecastPages.tsx
          src/components/weather/RainWindPages.tsx
          src/lib/public-portal.server.ts
      - name: Commitar correções
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/production/components/home-editorial-dashboard.tsx src/components/weather/WeatherEditorialHero.tsx src/components/weather/ForecastPages.tsx src/components/weather/RainWindPages.tsx src/lib/public-portal.server.ts
          git commit -m "fix: enforce observation and forecast boundaries"
          git push origin HEAD:agent/weather-data-integrity
