name: Aplicar integridade meteorológica

on:
  push:
    branches:
      - agent/weather-data-integrity
    paths:
      - .github/workflows/apply-weather-integrity-once.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/weather-data-integrity
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Corrigir semântica da previsão na home
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('src/production/components/home-editorial-dashboard.tsx')
          text = path.read_text()

          def replace_once(old, new):
              global text
              if old not in text:
                  raise SystemExit(f'Trecho não encontrado em {path}: {old[:100]!r}')
              text = text.replace(old, new, 1)

          replace_once(
              'type RainLevel = "none" | "low" | "moderate" | "high" | "very-high";',
              'type RainLevel = "unknown" | "none" | "low" | "moderate" | "high" | "very-high";'
          )

          replace_once(
          '''function rainReading(value: number) {
            const chance = Math.max(0, Math.min(100, Math.round(value)));

            if (chance === 0)
              return {
                chance,
                level: "none" as RainLevel,
                label: "Sem chuva indicada",
              };
            if (chance < 20) return { chance, level: "low" as RainLevel, label: "Chance baixa" };
            if (chance < 50)
              return {
                chance,
                level: "moderate" as RainLevel,
                label: "Chance moderada",
              };
            if (chance < 80) return { chance, level: "high" as RainLevel, label: "Chance alta" };
            return {
              chance,
              level: "very-high" as RainLevel,
              label: "Chance muito alta",
            };
          }''',
          '''function rainReading(value: number | null) {
            if (value === null) {
              return {
                chance: null,
                level: "unknown" as RainLevel,
                label: "Probabilidade não informada",
              };
            }

            const chance = Math.max(0, Math.min(100, Math.round(value)));

            if (chance === 0)
              return {
                chance,
                level: "none" as RainLevel,
                label: "Sem chuva indicada",
              };
            if (chance < 20) return { chance, level: "low" as RainLevel, label: "Chance baixa" };
            if (chance < 50)
              return {
                chance,
                level: "moderate" as RainLevel,
                label: "Chance moderada",
              };
            if (chance < 80) return { chance, level: "high" as RainLevel, label: "Chance alta" };
            return {
              chance,
              level: "very-high" as RainLevel,
              label: "Chance muito alta",
            };
          }'''
          )

          replace_once(
          '''  const peakHour = hourly.reduce<(typeof hourly)[number] | null>(
            (highest, hour) => (!highest || hour.precipitation > highest.precipitation ? hour : highest),
            null,
          );
          const strongestHourlyGust = hourly.reduce(
            (highest, hour) => Math.max(highest, hour.windGust),
            weather.current.windGust,
          );
          const rainiestDayChance = nextDays.reduce((highest, day) => Math.max(highest, day.rainChance), 0);''',
          '''  const hoursWithRainChance = hourly.filter((hour) => hour.precipitation !== null);
          const peakHour = hoursWithRainChance.reduce<(typeof hourly)[number] | null>(
            (highest, hour) =>
              !highest || (hour.precipitation ?? -1) > (highest.precipitation ?? -1) ? hour : highest,
            null,
          );
          const hourlyGusts = hourly
            .map((hour) => hour.windGust)
            .filter((value): value is number => value !== null);
          const strongestHourlyGust = hourlyGusts.length > 0 ? Math.max(...hourlyGusts) : null;
          const dayRainChances = nextDays
            .map((day) => day.rainChance)
            .filter((value): value is number => value !== null);
          const rainiestDayChance = dayRainChances.length > 0 ? Math.max(...dayRainChances) : null;'''
          )

          replace_once(
              '  const observationAvailable = observation.status !== "unavailable";',
              '  const observationAvailable = weather.current.available;'
          )

          replace_once('{today?.max ?? weather.current.temperature}°', '{today ? `${today.max}°` : "—"}')
          replace_once('{today?.min ?? weather.current.temperature}°', '{today ? `${today.min}°` : "—"}')
          replace_once('{today?.rainChance ?? 0}%', '{today?.rainChance === null || !today ? "Não informada" : `${today.rainChance}%`}')
          replace_once('{today?.windGust ?? weather.current.windGust} km/h', '{today?.windGust === null || !today ? "Não informada" : `${today.windGust} km/h`}')

          replace_once(
              'className={`rain-${rainReading(peakHour?.precipitation ?? 0).level}`}',
              'className={`rain-${rainReading(peakHour?.precipitation ?? null).level}`}'
          )
          replace_once('{peakHour?.precipitation ?? 0}%', '{peakHour?.precipitation === null || !peakHour ? "Não informada" : `${peakHour.precipitation}%`}')
          replace_once('{strongestHourlyGust} km/h', '{strongestHourlyGust === null ? "Não informada" : `${strongestHourlyGust} km/h`}')

          replace_once(
          '''            const className = [
              `rain-${rain.level}`,
              index === 0 ? "is-current" : "",
              isPeak ? "is-rain-peak" : "",
            ]''',
          '''            const className = [
              `rain-${rain.level}`,
              isPeak ? "is-rain-peak" : "",
            ]'''
          )
          replace_once(
              '            const isPeak = peakHour === hour && rain.chance > 0;',
              '            const isPeak = peakHour === hour && rain.chance !== null && rain.chance > 0;'
          )
          replace_once(
              'aria-label={`${hour.time}: ${hour.temperature} graus, ${rain.chance}% de chance de chuva e rajadas de até ${hour.windGust} quilômetros por hora`}',
              'aria-label={`${hour.time}: ${hour.temperature} graus, ${rain.chance === null ? "probabilidade de chuva não informada" : `${rain.chance}% de chance de chuva`} e ${hour.windGust === null ? "rajada não informada" : `rajadas de até ${hour.windGust} quilômetros por hora`}`}'
          )
          replace_once(
              '{index === 0 ? <b>Agora</b> : isPeak ? <b>Maior chance</b> : null}',
              '{isPeak ? <b>Maior chance</b> : null}'
          )
          replace_once('<strong>{rain.chance}%</strong>', '<strong>{rain.chance === null ? "—" : `${rain.chance}%`}</strong>')
          replace_once('<i style={{ width: `${rain.chance}%` }} />', '<i style={{ width: `${rain.chance ?? 0}%` }} />')
          replace_once(
              '<span className="home-hourly-story__wind">Rajada de até {hour.windGust} km/h</span>',
              '<span className="home-hourly-story__wind">{hour.windGust === null ? "Rajada não informada" : `Rajada de até ${hour.windGust} km/h`}</span>'
          )

          replace_once(
              '              const isRainiest = day.rainChance === rainiestDayChance && rain.chance >= 20;',
              '              const isRainiest = rainiestDayChance !== null && day.rainChance === rainiestDayChance && rain.chance !== null && rain.chance >= 20;'
          )
          replace_once('<b style={{ width: `${rain.chance}%` }} />', '<b style={{ width: `${rain.chance ?? 0}%` }} />')

          replace_once(
              '<h2 id="home-observation-story-title">Condições registradas agora</h2>',
              '<h2 id="home-observation-story-title">Medição local mais recente</h2>'
          )
          replace_once(
          '''            A previsão indica o que pode acontecer. A estação da Embrapa mostra as condições medidas
            neste momento.''',
          '''            A previsão indica o que pode acontecer. A estação da Embrapa fornece a observação local
            quando existe uma leitura recente e verificável.'''
          )
          replace_once('<strong>{formatNumber(observation.current.temperature)}°</strong>', '<strong>{formatNumber(weather.current.temperature)}°</strong>')
          replace_once('<span>Sensação de {formatNumber(observation.current.feelsLike)} °C</span>', '<span>{weather.current.feelsLike === null ? "Sensação não informada" : `Sensação de ${formatNumber(weather.current.feelsLike)} °C`}</span>')
          replace_once('<dd>{formatNumber(observation.current.humidity, 0)}%</dd>', '<dd>{weather.current.humidity === null ? "Não informada" : `${formatNumber(weather.current.humidity, 0)}%`}</dd>')
          replace_once('<dd>{formatNumber(observation.current.windSpeed)} km/h</dd>', '<dd>{weather.current.windSpeed === null ? "Não informado" : `${formatNumber(weather.current.windSpeed)} km/h`}</dd>')

          path.write_text(text)
          PY

      - name: Formatar arquivos alterados
        run: npx prettier --write src/production/components/home-editorial-dashboard.tsx

      - name: Commitar correções
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/production/components/home-editorial-dashboard.tsx
          git commit -m "fix: distinguish forecast from current measurements"
          git push origin HEAD:agent/weather-data-integrity
