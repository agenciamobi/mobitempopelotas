name: Validar integridade meteorológica

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/weather-data-integrity
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Remover importação sem uso
        run: sed -i '/^  Eye,$/d' src/components/weather/ForecastPages.tsx
      - name: Formatar arquivo
        run: npx prettier --write src/components/weather/ForecastPages.tsx
      - name: Validar contratos
        run: npm run test:contracts
      - name: Validar build
        run: npm run build
      - name: Validar rotas
        run: npm run test:routes
      - name: Validar TypeScript
        run: npm run typecheck
      - name: Validar ESLint
        run: npm run lint
      - name: Commitar correção final
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/weather/ForecastPages.tsx
          git commit -m "fix: remove unused weather icon import"
          git push origin HEAD:agent/weather-data-integrity
